function ejecutarBusqueda(){
  if(!_histData) return;
  var isAdmin=CU&&(CU.role==='admin'||CU.role==='admin_master');
  var q=((document.getElementById('buscar-q')||{}).value||'').trim().toLowerCase();
  var res=document.getElementById('buscar-res');
  if(!res) return;
  if(q.length<2){
    res.innerHTML='<div style="text-align:center;color:var(--gray);font-size:0.8rem;padding:16px">Escribe al menos 2 caracteres</div>';
    return;
  }
  var matches=_histData.filter(function(t){
    var nom=((t.nombre||'')+' '+(t.apellido||'')).toLowerCase();
    var ced=(t.cedula||'').toLowerCase();
    return nom.indexOf(q)>=0||ced.indexOf(q)>=0;
  });
  if(!matches.length){
    res.innerHTML='<div style="text-align:center;color:var(--gray);font-size:0.82rem;padding:20px">Sin resultados para "'+q+'"</div>';
    return;
  }
  var totFac=0,totPaq=0,totProd=0,totGasto=0;
  matches.forEach(function(t){
    if(t.facial) totFac++;
    if(t.pack3||t.pack6) totPaq++;
    if(t.productos) totProd+=t.productos.length;
    totGasto+=parseFloat(t.estimado)||0;
  });
  var html='<div style="background:white;border-radius:14px;box-shadow:var(--shadow-sm);padding:14px;margin-bottom:14px">'
    +'<div style="font-size:0.65rem;font-weight:700;color:var(--gray);text-transform:uppercase;margin-bottom:9px;letter-spacing:0.5px">Resumen — '+matches.length+' ticket(s)</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px">'
    +'<div style="background:var(--blue-l);border-radius:9px;padding:9px;text-align:center"><div style="font-size:1.3rem;font-weight:800;color:var(--navy)">'+totFac+'</div><div style="font-size:0.6rem;color:var(--gray);text-transform:uppercase">Faciales</div></div>'
    +'<div style="background:var(--green-l);border-radius:9px;padding:9px;text-align:center"><div style="font-size:1.3rem;font-weight:800;color:var(--green)">'+totPaq+'</div><div style="font-size:0.6rem;color:var(--gray);text-transform:uppercase">Paquetes</div></div>'
    +'<div style="background:var(--peach-l);border-radius:9px;padding:9px;text-align:center"><div style="font-size:1.3rem;font-weight:800;color:var(--peach)">'+totProd+'</div><div style="font-size:0.6rem;color:var(--gray);text-transform:uppercase">Productos</div></div>'
    +'<div style="background:var(--gold-l);border-radius:9px;padding:9px;text-align:center"><div style="font-size:1.1rem;font-weight:800;color:var(--gold)">$'+totGasto.toFixed(2)+'</div><div style="font-size:0.6rem;color:var(--gray);text-transform:uppercase">Total</div></div>'
    +'</div></div>';
  matches.forEach(function(t){
    html+=_buildTicketCard(t, true);
  });
  res.innerHTML=html;
}

function _cajaEnviarGasto(){
  var desc=(document.getElementById('cg-desc')||{}).value||'';
  var monto=parseFloat((document.getElementById('cg-monto')||{}).value||0);
  var quien=CU.name;
  var justif=(document.getElementById('cg-justif')||{}).value||'';
  if(!desc.trim()){toast('Escribe la descripción del gasto','#B86B6B');return;}
  if(!monto||monto<=0){toast('Ingresa un monto válido','#B86B6B');return;}
  var btn=document.querySelector('#caja-forms button');
  _cajaSetLoading(true,'cg');
  var _cgUrl=APPS_SCRIPT_URL
    +'?action=cajaGasto'
    +'&desc='+encodeURIComponent(desc.trim())
    +'&monto='+encodeURIComponent(monto)
    +'&quien='+encodeURIComponent(quien)
    +'&justif='+encodeURIComponent(justif.trim())
    +'&registradoPor='+encodeURIComponent(CU.name)
    +'&tsApp='+encodeURIComponent(new Date().toISOString())
    +'&_t='+Date.now();
  fetch(_cgUrl)
    .then(function(r){return r.json();})
    .then(function(d){

      document.getElementById('cg-monto').value='';
      document.getElementById('cg-justif').value='';

      _cajaCargarMovimientos();

async function descargarRol(sheetName, cedula, btnEl) {
  var btn = btnEl || event.target;
  var origText = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;

  var res;
  try {
    var r = await fetch(APPS_SCRIPT_URL + '?action=getRolIndividual&sheet=' + encodeURIComponent(sheetName) + '&cedula=' + encodeURIComponent(cedula) + '&_t=' + Date.now());
    res = await r.json();
  } catch(err) {
    btn.textContent = origText; btn.disabled = false;
    alert('Error de conexión: ' + err.message);
    return;
  }

  if (!res || !res.ok || !res.data) {
    btn.textContent = origText; btn.disabled = false;
    alert('No se encontró el rol. Verifica que el rol fue generado y el Sistema Central redesplegado.');
    return;
  }

  // Fetch multas detail for this employee
  var multasDetalle = [];
  try {
    var cedula2 = cedula;
    // Get multas from the historial if available, or from the rol data
    // For now use what came in res.data - extend with separate call if needed
    multasDetalle = res.data.multasDetalle || [];
  } catch(e2) {}
  var html = generarHtmlRol(res.data, sheetName.replace('_',' '), multasDetalle);

  // Modal inline
  var modal = document.getElementById('rol-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'rol-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:16px;box-sizing:border-box';
    document.body.appendChild(modal);
  }
  modal.innerHTML =
    '<div style="background:#fff;width:100%;max-width:700px;border-radius:8px;overflow:hidden">' +
      '<div style="background:#3D5A7A;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">' +
        '<span style="color:#fff;font-weight:600">Rol de Pagos</span>' +
        '<div style="display:flex;gap:8px">' +
          '<button onclick="imprimirRol()" style="background:#fff;color:#3D5A7A;border:none;border-radius:4px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600">🖨️ Imprimir</button>' +
          '<button onclick="document.getElementById(\'rol-modal\').remove()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:4px;padding:6px 10px;cursor:pointer;font-size:16px">✕</button>' +
        '</div>' +
      '</div>' +
      '<iframe id="rol-iframe" style="width:100%;height:75vh;border:none"></iframe>' +
    '</div>';
  modal.style.display = 'flex';

  // Load HTML into iframe via blob URL
  var blob = new Blob([html], {type:'text/html'});
  var blobUrl = URL.createObjectURL(blob);
  var iframe = document.getElementById('rol-iframe');
  iframe.src = blobUrl;

  btn.textContent = origText;
  btn.disabled = false;
}


function imprimirRol() {
  var iframe = document.getElementById('rol-iframe');
  if (iframe) iframe.contentWindow.print();
}

var TIPOS_PERMISO = [
  {id:'medico',    label:'Permiso médico / cita IESS / judicial', unidad:'horas',  remunerado:true},
  {id:'personal',  label:'Permiso personal no remunerado',        unidad:'horas',  remunerado:false},
  {id:'enfermedad',label:'Enfermedad justificada con certificado', unidad:'dias',   remunerado:true},
  {id:'calamidad', label:'Fallecimiento / calamidad familiar',     unidad:'dias',   remunerado:true},
  {id:'maternidad',label:'Licencia de maternidad',                 unidad:'dias',   remunerado:true},
  {id:'capacit',   label:'Capacitación o reunión interna',        unidad:'dias',   remunerado:true},
  {id:'vacaciones',label:'Vacaciones anuales',                     unidad:'dias',   remunerado:true},
];

async function renderPermisos(c) {
  var isAdmin = CU && (CU.role==='admin' || CU.role==='admin_master');
  c.innerHTML =
    '<div style="padding:16px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<h2 style="font-size:16px;font-weight:600;margin:0">🏖️ Permisos</h2>' +
      (!isAdmin ? '<button onclick="abrirSolicitudPermiso()" style="background:#3D5A7A;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:600">+ Solicitar Permiso</button>' : '') +
    '</div>' +
    '<div id="permisos-loading" style="text-align:center;color:#888;padding:40px">⏳ Cargando...</div>' +
    '<div id="permisos-content" style="display:none"></div>' +
    '</div>';

  var res;
  try {
    var r = await fetch(APPS_SCRIPT_URL + '?action=getPermisos&_t=' + Date.now());
    res = await r.json();
  } catch(e) {
    document.getElementById('permisos-loading').innerHTML = '<div style="color:red">❌ Error: ' + e.message + '</div>';
    return;
  }

  document.getElementById('permisos-loading').style.display = 'none';
  var ct = document.getElementById('permisos-content');
  ct.style.display = 'block';

  var permisos = (res.ok && res.data) ? res.data : [];

  // Filtrar según rol
  if (!isAdmin) {
    var miNombre = CU.name || '';
    permisos = permisos.filter(function(p) {
      return p.empleada && p.empleada.toLowerCase().indexOf(miNombre.toLowerCase().split(' ')[0]) >= 0;
    });
  }

  // Separar pendientes y resto
  var pendientes = permisos.filter(function(p){ return p.estado === 'PENDIENTE'; });
  var otros      = permisos.filter(function(p){ return p.estado !== 'PENDIENTE'; });

  var html = '';

  // Pendientes (admins con botones de acción)
  if (pendientes.length > 0) {
    html += '<div style="margin-bottom:20px">' +
      '<div style="background:#C4943A;color:#fff;padding:8px 14px;border-radius:8px 8px 0 0;font-weight:600;font-size:13px">' +
        '⏳ Pendientes (' + pendientes.length + ')' +
      '</div>' +
      '<div style="border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px">';

    pendientes.forEach(function(p, i) {
      html += renderPermisoRow(p, i, isAdmin, true);
    });
    html += '</div></div>';
  }

  // Historial
  if (otros.length > 0) {
    html += '<div>' +
      '<div style="background:#5B7FA6;color:#fff;padding:8px 14px;border-radius:8px 8px 0 0;font-weight:600;font-size:13px">' +
        '📋 Historial' +
      '</div>' +
      '<div style="border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px">';
    otros.forEach(function(p, i) {
      html += renderPermisoRow(p, i, isAdmin, false);
    });
    html += '</div></div>';
  }

  if (!pendientes.length && !otros.length) {
    html = '<div style="text-align:center;color:#888;padding:40px">No hay solicitudes de permiso aún.</div>';
  }

  ct.innerHTML = html;
}

function renderPermisoRow(p, i, isAdmin, showActions) {
  var estadoColor = p.estado==='APROBADO' ? '#2D7A4F' : p.estado==='RECHAZADO' ? '#B86B6B' : '#C4943A';
  var estadoIcon  = p.estado==='APROBADO' ? '✅' : p.estado==='RECHAZADO' ? '❌' : '⏳';
  var tipo = TIPOS_PERMISO.find(function(t){ return t.id === p.tipo; });
  var tipoLabel = tipo ? tipo.label : p.tipo;
  var remLabel = (tipo && !tipo.remunerado) ? ' · No remunerado' : '';

  var row = '<div style="padding:12px 14px;border-bottom:1px solid #f5f5f5;background:' + (i%2===0?'#fff':'#f9f9f9') + '">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
      '<div style="flex:1">' +
        '<div style="font-weight:600;font-size:13px">' + p.empleada + '</div>' +
        '<div style="font-size:12px;color:#555;margin-top:2px">' + tipoLabel + remLabel + '</div>' +
        '<div style="font-size:11px;color:#888;margin-top:2px">' +
          p.fechaInicio + (p.fechaFin && p.fechaFin!==p.fechaInicio ? ' → ' + p.fechaFin : '') +
          (p.horas ? ' · ' + p.horas + 'h' : '') +
        '</div>' +
        (p.motivo ? '<div style="font-size:11px;color:#666;margin-top:3px;font-style:italic">"' + p.motivo + '"</div>' : '') +
        (p.urlFoto ? '<a href="' + p.urlFoto + '" target="_blank" style="font-size:11px;color:#3D5A7A;text-decoration:none">📎 Ver certificado</a>' : '') +
      '</div>' +
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-left:8px">' +
        '<span style="font-size:11px;font-weight:600;color:' + estadoColor + '">' + estadoIcon + ' ' + p.estado + '</span>';

  if (isAdmin && showActions) {
    row +=
      '<div style="display:flex;gap:6px">' +
        '<button data-pid="' + p.id + '" data-est="APROBADO" onclick="accionPermiso(this)" ' +
          'style="background:#2D7A4F;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer">✅ Aprobar</button>' +
        '<button data-pid="' + p.id + '" data-est="RECHAZADO" onclick="accionPermiso(this)" ' +
          'style="background:#B86B6B;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer">❌ Rechazar</button>' +
      '</div>';
  }

  row += '</div></div></div>';
  return row;
}

      '<div id="perm-horas-div" style="margin-bottom:12px;display:none">' +
        '<label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px">Horas solicitadas</label>' +
        '<input type="number" id="perm-horas" min="0.5" max="8" step="0.5" value="1" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box">' +
      '</div>' +

      '<label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px">Motivo</label>' +
      '<textarea id="perm-motivo" rows="3" placeholder="Describe brevemente el motivo..." style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;resize:none;margin-bottom:12px"></textarea>' +

      '<div id="perm-foto-div" style="display:none;margin-bottom:16px">' +
        '<label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px">📎 Foto del certificado médico</label>' +
        '<input type="file" id="perm-foto" accept="image/*" capture="camera" ' +
          'style="width:100%;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box">' +
        '<div id="perm-foto-preview" style="margin-top:8px"></div>' +
      '</div>' +

      '<button onclick="enviarSolicitudPermiso()" style="width:100%;background:#3D5A7A;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer">Enviar Solicitud</button>' +
    '</div>';

  // Set today as default date
  var hoy = new Date().toISOString().slice(0,10);
  document.getElementById('perm-fecha-inicio').value = hoy;
  document.getElementById('perm-fecha-fin').value = hoy;
  actualizarFormPermiso();
}

function actualizarFormPermiso() {
  var sel = document.getElementById('perm-tipo');
  if (!sel) return;
  var unidad = sel.options[sel.selectedIndex].getAttribute('data-unidad');
  var tipo = sel.value;
  document.getElementById('perm-horas-div').style.display = unidad === 'horas' ? 'block' : 'none';
  document.getElementById('perm-fecha-fin-div').style.display = unidad === 'dias' ? 'block' : 'none';
  // Mostrar campo de foto solo para permiso médico y enfermedad
  var fotoDiv = document.getElementById('perm-foto-div');
  if (fotoDiv) fotoDiv.style.display = (tipo === 'medico' || tipo === 'enfermedad') ? 'block' : 'none';
  // Preview de foto
  var fotoInput = document.getElementById('perm-foto');
  if (fotoInput) fotoInput.onchange = function() {
    var preview = document.getElementById('perm-foto-preview');
    if (this.files && this.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) {
        preview.innerHTML = '<img src="' + e.target.result + '" style="max-width:100%;max-height:150px;border-radius:6px;margin-top:4px">';
      };
      reader.readAsDataURL(this.files[0]);
    }
  };
}

async function enviarSolicitudPermiso() {
  // Prevent double submission
  var submitBtn = document.querySelector('#permiso-modal button:last-child');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Enviando...'; }
  var tipo       = document.getElementById('perm-tipo').value;
  var fechaInicio= document.getElementById('perm-fecha-inicio').value;
  var fechaFin   = document.getElementById('perm-fecha-fin').value || fechaInicio;
  var horas      = document.getElementById('perm-horas').value;
  var motivo     = document.getElementById('perm-motivo').value.trim();
  var sel        = document.getElementById('perm-tipo');
  var unidad     = sel.options[sel.selectedIndex].getAttribute('data-unidad');

  if (!fechaInicio) { alert('Selecciona una fecha'); return; }
  if (!motivo)      { alert('Escribe el motivo'); return; }

  // Leer foto si existe (como base64)
  var fotoBase64 = null;
  var fotoInput = document.getElementById('perm-foto');
  if (fotoInput && fotoInput.files && fotoInput.files[0]) {
    fotoBase64 = await new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = function(e) { resolve(e.target.result); };
      reader.readAsDataURL(fotoInput.files[0]);
    });
  }

  var payload = {
    empleada:   CU.name,
    tipo:       tipo,
    fechaInicio:fechaInicio,
    fechaFin:   unidad === 'dias' ? fechaFin : fechaInicio,
    horas:      unidad === 'horas' ? horas : null,
    motivo:     motivo,
    estado:     'PENDIENTE',
    solicitado: new Date().toISOString().slice(0,10),
    foto:       fotoBase64,
  };

  try {
    var r = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({accion: 'savePermiso', permiso: payload})
    });
    var res = await r.json();
    if (res.ok) {
      var m = document.getElementById('permiso-modal');
      if (m) m.remove();
      alert('✅ Solicitud enviada. Pendiente de aprobación.');
      var ct = document.getElementById('content');
      if (ct) renderPermisos(ct);
    } else {
      alert('❌ Error: ' + (res.error||'No se pudo enviar'));
    }
  } catch(e) {
    alert('❌ Error de conexión: ' + e.message);
  }
}

async function accionPermiso(btn) {
  var id     = btn.dataset ? btn.dataset.pid : btn.getAttribute('data-pid');
  var estado = btn.dataset ? btn.dataset.est : btn.getAttribute('data-est');
  if (!id || !estado) { alert('Error: datos del permiso no disponibles'); return; }
  var confirmMsg = estado === 'APROBADO'
    ? '¿Aprobar este permiso? Recuerda registrarlo también en Jibble.'
    : '¿Rechazar este permiso?';
  if (!confirm(confirmMsg)) return;

  try {
    var r = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({accion: 'updatePermiso', id: id, estado: estado, aprobadoPor: CU.name})
    });
    var res = await r.json();
    if (res.ok) {
      var ct = document.getElementById('content');
      renderPermisos(ct);
      if (estado === 'APROBADO') {
        alert('✅ Permiso aprobado. Regístralo en Jibble → Tiempo Libre.');
      }
    } else {
      alert('❌ Error: ' + (res.error||'No se pudo actualizar'));
    }
  } catch(e) {
    alert('❌ Error: ' + e.message);
  }
}

</script>
