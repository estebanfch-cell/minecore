function renderHistorialComisiones(c, isAdmin){
  c.innerHTML='<div style="font-size:0.88rem;font-weight:800;color:var(--navy);margin-bottom:12px">📋 Historial de Comisiones</div>'
    +'<div class="loading"><div class="spinner"></div>Cargando períodos...</div>';

    .then(function(r){return r.text();})

      if(d.error){c.innerHTML='<div class="card" style="color:var(--red)">❌ '+d.error+'</div>';return;}

        return;

      var html='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
        +'<button onclick="'+(isAdmin?'renderDashAdmin':'renderDashCosm')+'(document.getElementById(\'content\'))" style="padding:6px 12px;background:var(--cream);color:var(--navy);border:1.5px solid var(--cream-d);border-radius:9px;font-size:0.72rem;font-weight:700;cursor:pointer">← Volver</button>'
        +'<div style="font-size:0.88rem;font-weight:800;color:var(--navy)">📋 Historial de Comisiones</div>'
        +'</div>';
      periodos.forEach(function(p){

          +'<div><div style="font-size:0.78rem;font-weight:700;color:var(--navy)">'+label+'</div>'
          +'<div style="font-size:0.62rem;color:var(--gray)">'+p.nombre+'</div></div>'

          +'style="padding:6px 13px;background:var(--navy);color:white;border:none;border-radius:9px;font-size:0.7rem;font-weight:700;cursor:pointer">Ver →</button>'

function verPeriodoComision(btn){
  var nombre=btn.getAttribute('data-nombre');
  var isAdmin=btn.getAttribute('data-isadmin')==='true';
  var c=document.getElementById('content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Cargando '+nombre+'...</div>';
  fetch(APPS_SCRIPT_URL+'?action=getPeriodoComision&nombre='+encodeURIComponent(nombre))
    .then(function(r){return r.text();})
    .then(function(txt){
      var d; try{d=JSON.parse(txt);}catch(e){d={error:txt.slice(0,80)};}
      var titulo=btn.getAttribute('data-titulo')||nombre;
      var backBtn='<button onclick="renderHistorialComisiones(document.getElementById(\'content\'),'+isAdmin+')" style="padding:6px 12px;background:var(--cream);color:var(--navy);border:1.5px solid var(--cream-d);border-radius:9px;font-size:0.72rem;font-weight:700;cursor:pointer">← Volver</button>';
      if(d.error){
        c.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+backBtn
          +'<div style="font-size:0.82rem;font-weight:800;color:var(--navy)">'+nombre+'</div></div>'
          +'<div class="card" style="color:var(--red)">❌ '+d.error+'</div>';
        return;
      }
      var pd=d.data||{};
      var cosms=pd.cosmetologas||[];
      var clientas=pd.clientas||'—';
      var bonoActivo=pd.bonoActivo;
      var tituloMostrar=pd.titulo||titulo;

      var html='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+backBtn
        +'<div style="font-size:0.82rem;font-weight:800;color:var(--navy)">'+tituloMostrar+'</div></div>'
        +'<div style="background:var(--cream);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;gap:20px">'
        +'<div><div style="font-size:0.58rem;color:var(--gray);text-transform:uppercase">Clientas</div>'
        +'<div style="font-size:0.9rem;font-weight:800;color:var(--navy)">'+clientas+'</div></div>'
        +'<div><div style="font-size:0.58rem;color:var(--gray);text-transform:uppercase">Bono</div>'
        +'<div style="font-size:0.8rem;font-weight:700;color:'+(bonoActivo?'#2E7D52':'#888')+'">'+( bonoActivo?'✅ Activo':'❌ Inactivo')+'</div></div>'
        +'</div>';

      cosms.forEach(function(cosm){
        var name=cosm.name||'';
        if(!name) return;
        if(!isAdmin&&CU&&name.toUpperCase()!==CU.name.toUpperCase()) return;
        var f=parseFloat(cosm.f)||0, paq=parseFloat(cosm.paq)||0, niv=cosm.niv||'—';
        var cf=parseFloat(cosm.cf)||0, cpaq=parseFloat(cosm.cpaq)||0;
        var cprod=parseFloat(cosm.cprod)||0, total=parseFloat(cosm.total)||0;
        var extN=parseFloat(cosm.ext)||0, cext=parseFloat(cosm.cext)||0, crecep=parseFloat(cosm.crecep)||0;
        var multas=parseFloat(cosm.m)||0, desc=parseFloat(cosm.d)||0;
        // Find cosm color
        var cosmColor=(DEFAULT_USERS.find(function(u){return u.name.toUpperCase()===name.toUpperCase();})||{}).color||'var(--navy)';
        html+='<div class="cosm-card">'
          +'<div class="cosm-hdr" style="background:'+cosmColor+'"><span>'+name+'</span><span>$'+total.toFixed(2)+'</span></div>'
          +'<div class="cosm-body">'
          +'<div class="crow"><span>Faciales · comisión</span><span class="v"><span style="color:var(--navy);font-weight:700">'+f+'</span> · <span style="color:var(--green)">$'+cf.toFixed(2)+'</span></span></div>'
          +'<div class="crow"><span>Paquetes · nivel · com.</span><span class="v"><span style="color:var(--navy);font-weight:700">'+paq+' · '+niv+'</span> · <span style="color:var(--green)">$'+cpaq.toFixed(2)+'</span></span></div>'
          +'<div class="crow"><span>Productos · comisión</span><span class="v"><span style="color:var(--navy);font-weight:700">'+(cosm.totalProd||cosm.prods||0)+'</span> · <span style="color:var(--green)">$'+cprod.toFixed(2)+'</span></span></div>'
          +((extN>0||cext>0)?'<div class="crow"><span>Extras · comisión</span><span class="v"><span style="color:var(--navy);font-weight:700">'+extN+'</span> · <span style="color:var(--green)">$'+cext.toFixed(2)+'</span></span></div>':'')
          +(crecep>0?'<div class="crow"><span>Recepción · comisión</span><span class="v" style="color:var(--green)">$'+crecep.toFixed(2)+'</span></div>':'')
          +(multas>0?'<div class="crow"><span>Multas</span><span class="v" style="color:var(--red)">−$'+multas.toFixed(2)+'</span></div>':'')
          +(desc>0?'<div class="crow"><span>Descuentos</span><span class="v" style="color:var(--gold)">−$'+desc.toFixed(2)+'</span></div>':'')
          +'<div class="ctotal"><span>💰 Neto</span><span style="color:'+cosmColor+'">$'+total.toFixed(2)+'</span></div>'
          +'</div></div>';
      });

      if(!html.includes('💆')){
        html+='<div class="card" style="text-align:center;color:var(--gray)">Sin datos para este período</div>';
      }
      c.innerHTML=html;
    })
    .catch(function(e){c.innerHTML='<div class="card" style="color:var(--red)">❌ Error: '+e.message+'</div>';});
}

function showAdd(){showModal(`<h3>Nuevo usuario</h3>
  <div class="field"><label>Nombre completo</label><input type="text" id="mn" placeholder="Nombre Apellido"></div>
  <div class="field"><label>Nombre corto</label><input type="text" id="ms" placeholder="Nombre"></div>

  <div class="modal-btns"><button class="modal-btn cancel" onclick="closeModal()">Cancelar</button><button class="modal-btn primary" onclick="saveAdd()">Guardar</button></div>`);}
function saveAdd(){
  const n=document.getElementById('mn').value.trim(),s=document.getElementById('ms').value.trim(),r=document.getElementById('mr').value,p=document.getElementById('mp').value,col=document.getElementById('mc').value;
  if(!n||!s||p.length!==4){toast('Completa todos los campos con PIN de 4 dígitos','#B86B6B');return;}
  const users=getUsers();users.push({id:'u'+Date.now(),name:n,short:s,role:r,color:col,pin:p});saveUsers(users);closeModal();toast('✅ Usuario creado','#6A9E7A');renderAdmin(document.getElementById('content'));
}
function showEdit(id){
  const u=getUsers().find(u=>u.id===id);if(!u) return;
  showModal(`<h3>Editar — ${u.short}</h3>
    <div class="field"><label>Nombre completo</label><input type="text" id="mn" value="${u.name}"></div>
    <div class="field"><label>Nombre corto</label><input type="text" id="ms" value="${u.short}"></div>
    <div class="field"><label>Rol</label><select id="mr"><option value="staff" ${u.role==='staff'?'selected':''}>Cosmetóloga</option><option value="reception" ${u.role==='reception'?'selected':''}>Recepción/Admin</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option><option value="admin_master" ${u.role==='admin_master'?'selected':''}>Admin Master</option></select></div>
    <div class="field"><label>Nuevo PIN (vacío = no cambiar)</label><input type="password" inputmode="numeric" maxlength="4" id="mp" placeholder="••••"></div>
    <div class="field"><label>Color</label><input type="color" id="mc" value="${u.color}"></div>
    <div class="modal-btns"><button class="modal-btn cancel" onclick="closeModal()">Cancelar</button><button class="modal-btn primary" onclick="saveEdit('${id}')">Guardar</button></div>`);}
function saveEdit(id){
  const users=getUsers(),idx=users.findIndex(u=>u.id===id);if(idx<0) return;
  const p=document.getElementById('mp').value;
  users[idx].name=document.getElementById('mn').value.trim();
  users[idx].short=document.getElementById('ms').value.trim();
  users[idx].role=document.getElementById('mr').value;
  users[idx].color=document.getElementById('mc').value;
  if(p.length===4) users[idx].pin=p;
  saveUsers(users);closeModal();toast('✅ Actualizado','#6A9E7A');renderAdmin(document.getElementById('content'));
}
function showDel(id){showModal(`<h3>¿Eliminar usuario?</h3><p style="font-size:0.8rem;color:var(--gray);margin-bottom:4px">Esta acción no se puede deshacer.</p><div class="modal-btns"><button class="modal-btn cancel" onclick="closeModal()">Cancelar</button><button class="modal-btn primary" style="background:var(--red)" onclick="confDel('${id}')">Eliminar</button></div>`);}
function confDel(id){saveUsers(getUsers().filter(u=>u.id!==id));closeModal();toast('Usuario eliminado','#B86B6B');renderAdmin(document.getElementById('content'));}
function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function toast(msg,bg){const t=document.getElementById('toast');t.textContent=msg;t.style.background=bg||'#6A9E7A';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

    return DEMO_REGISTRO.find(c=>(c.nombre+' '+c.apellido).toLowerCase().includes(n))||null;
  }
  return null;
}

// ── Búsqueda de cliente en REGISTRO del sheet (bidireccional) ──
async function buscarEnRegistroSheet(tipo, valor) {
  if (!valor || valor.length < 3) return;
  try {
    var url = APPS_SCRIPT_URL + '?action=getRegistro&' + tipo + '=' + encodeURIComponent(valor) + '&_t=' + Date.now();
    var r = await fetch(url);
    var text = await r.text();
    var res;
    try { res = JSON.parse(text); } catch(pe) { console.error('Parse error:', text.slice(0,200)); return; }
    console.log('getRegistro result for', tipo, valor, ':', res);
    if (!res.ok || !res.data || !res.data.length) { console.log('No results found'); return; }
    var cliente = res.data[0];
    if (tipo === 'ced') {
      // Buscamos por cédula → rellenar nombre y apellido si están vacíos
      var nom = document.getElementById('inp-nom');
      var ape = document.getElementById('inp-ape');
      if (nom && !nom.value) { nom.value = cliente.nombre; T.nombre = cliente.nombre; }
      if (ape && !ape.value) { ape.value = cliente.apellido; T.apellido = cliente.apellido; }
    } else {
      // Buscamos por nombre → siempre rellenar cédula si hay 1 resultado exacto
      if (res.data.length === 1 && cliente.cedula) {
        T.cedula = cliente.cedula;
        // Query fresh - DOM may have re-rendered
        var ced = document.getElementById('inp-ced');
        if (ced) {
          ced.value = cliente.cedula;
        } else {
          // Try again after short delay in case DOM is still rendering
          setTimeout(function() {
            var ced2 = document.getElementById('inp-ced');
            if (ced2) ced2.value = cliente.cedula;
          }, 300);
        }
      }
    }
  } catch(e) { /* silencioso */ }
}

function mostrarCitas(c, rawData, isAdmin, fecha, hasAcuity, hasError) {
  let citas = [];
  try {
    citas = rawData
      .filter(function(apt){ return !apt.canceled; })
      .sort(function(a,b){ return new Date(a.datetime) - new Date(b.datetime); })
      .map(function(apt) {
        const dt = new Date(apt.datetime);
        const hora = dt.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit',hour12:true});
        const esPrimera = (apt.type||'').includes('PRIMERA');
        let tipoPiel = '', tratamientos = '';
        if(apt.forms && apt.forms[0] && apt.forms[0].values) {
          apt.forms[0].values.forEach(function(v) {
            if(v.name && v.name.includes('Piel')) tipoPiel = v.value||'';
            if(v.name && v.name.includes('Reciente')) tratamientos = v.value||'';
          });
        }
        return {
          id: String(apt.id),
          hora: hora,
          nombre: (apt.calendar||'').trim(),
          clienteNombre: ((apt.firstName||'')+' '+(apt.lastName||'')).trim(),
          clienteEmail: apt.email||'',
          clienteCedula: '',  // No usar teléfono de Acuity como cédula - REGISTRO lo llena
          servicio: apt.type||'',
          duracion: parseInt(apt.duration)||60,
          notas: apt.notes||'',
          tipoPiel: tipoPiel,
          esPrimera: esPrimera,
          completada: apt.labels && apt.labels.some(function(l){ return l.name==='COMPLETADO'; }),
        };
      });
  } catch(e) { citas = []; }

  if(!isAdmin) citas = citas.filter(function(ci){ return (ci.calendar||ci.nombre||'').toLowerCase().indexOf((CU.short||'').toLowerCase().split(' ')[0].toLowerCase()) >= 0; });
  window._citasHoy = citas;

  const btnColor = hasAcuity ? 'var(--green-l)' : 'var(--gold-l)';
  const btnTxtColor = hasAcuity ? 'var(--green)' : 'var(--gold)';
  const btnBorder = hasAcuity ? 'var(--green)' : '#EDD89A';
  const btnLabel = hasAcuity ? '✅ Acuity conectado' : '⚙ Config Acuity';

  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
    '<div>' +
      '<div style="font-size:0.76rem;font-weight:700;color:var(--navy);text-transform:capitalize">' + fecha + '</div>' +
      '<div style="font-size:0.68rem;color:var(--gray)">' + citas.length + ' citas programadas' + (isAdmin?'':' para ti') + '</div>' +
    '</div>' +
    '<button onclick="showAcuityConfig()" style="background:'+btnColor+';color:'+btnTxtColor+';border:1.5px solid '+btnBorder+';padding:6px 12px;border-radius:9px;font-size:0.7rem;font-weight:700;cursor:pointer">' + btnLabel + '</button>' +
  '</div>';

  if(citas.length === 0) {
    html += '<div class="card" style="text-align:center;padding:32px 20px">' +
      '<div style="font-size:2rem;margin-bottom:8px">🗓</div>' +
      '<div style="font-size:0.84rem;color:var(--gray)">No hay citas para hoy</div>' +
    '</div>';
  } else {
    citas.forEach(function(ci) {
      const cliente = buscarClienteEnRegistro(ci.clienteCedula, ci.clienteNombre);
      const esAntigua = !!cliente;
      const borderColor = ci.completada ? 'var(--gray)' : esAntigua ? 'var(--green)' : 'var(--gold)';
      const opacity = ci.completada ? '0.65' : '1';

      html += '<div class="card" style="margin-bottom:10px;border-left:4px solid '+borderColor+';opacity:'+opacity+'">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">' +
          '<div style="flex:1;min-width:0">' +
            '<div style="display:flex;align-items:center;gap:8px">' +
              '<div style="font-size:1rem;font-weight:800;color:var(--navy)">' + ci.hora + '</div>' +
              (ci.completada ? '<span style="background:var(--gray-l);color:var(--gray);font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:6px">COMPLETADA</span>' : '') +
            '</div>' +
            '<div style="font-size:0.8rem;font-weight:700;color:var(--text);margin-top:3px">' + ci.clienteNombre + '</div>' +
            '<div style="font-size:0.68rem;color:var(--gray);margin-top:2px">' + ci.servicio.replace('¿ES TU PRIMERA VEZ?✨ 🫧','🆕').replace('!GRACIAS POR REGRESAR! 🫰','⭐') + '</div>' +
            '<div style="font-size:0.67rem;color:var(--gray);margin-top:1px">⏱ ' + ci.duracion + ' min' + (isAdmin ? ' · 👤 ' + ci.nombre : '') + '</div>' +

        (esAntigua ?

            '🆕 ' + (ci.esPrimera ? 'Primera vez — incluye Skin Analysis' : 'Clienta nueva') +
          '</div>'
        ) +
        (ci.notas ? '<div style="font-size:0.72rem;color:var(--navy);background:var(--lavender-l);border:1px solid #C8C0E0;border-radius:8px;padding:7px 10px;margin-bottom:10px">📌 ' + ci.notas + '</div>' : '') +
        (ci.tipoPiel ? '<div style="font-size:0.7rem;color:var(--gray);margin-bottom:8px">🧴 Tipo piel: <strong>' + ci.tipoPiel + '</strong></div>' : '') +
        (!ci.completada ?
          '<button onclick="generarTicketDesdeCita(this)" data-cita-id="' + ci.id + '" style="width:100%;padding:10px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:0.82rem;font-weight:700;cursor:pointer">🎫 Generar Ticket para ' + ci.clienteNombre.split(' ')[0] + '</button>'
        :
          '<div style="text-align:center;font-size:0.76rem;color:var(--gray);padding:4px">✓ Ticket ya generado</div>'
        ) +
      '</div>';
    });
  }

  // Append to existing content or replace
  const existing = c.querySelector('[style*="display:flex"]');
  if(existing && hasError) {
    c.innerHTML += html;
  } else {
    c.innerHTML = html;
  }
}


function generarTicketDesdeCita(btn){
  const id = btn.getAttribute('data-cita-id');
  const ci = (window._citasHoy||[]).find(function(c){return c.id===id;}) || DEMO_CITAS[0];

  // Extraer nombre y apellido desde ci.clienteNombre (ignorar cedula de Acuity)
  const parts = ci.clienteNombre.trim().split(' ');
  const _nom = parts[0] || '';
  const _ape = parts.slice(1).join(' ') || '';
  const _nombreCompleto = (_nom + ' ' + _ape).trim();

  // Pre-fill ticket state (sin cedula - la busca el REGISTRO)
  T = newT();
  T.nombre   = _nom;
  T.apellido = _ape;

  // Switch to ticket tab
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  const ticketTab = document.querySelector('.tab');
  if(ticketTab) ticketTab.classList.add('active');
  const _cont = document.getElementById('content');
  renderTicket(_cont);

  // Llenar campos y buscar cédula
  setTimeout(function(){
    var nomEl = document.getElementById('inp-nom');
    var apeEl = document.getElementById('inp-ape');
    if(nomEl) nomEl.value = _nom;
    if(apeEl) apeEl.value = _ape;
    toast('Ticket para ' + ci.clienteNombre, '#6A9E7A');

    // Buscar cédula - y cuando retorne, mantener un watcher que llene el campo
    if(_nom && _ape) {
      var _buscarNomCompleto = _nom + ' ' + _ape;
      fetch(APPS_SCRIPT_URL + '?action=getRegistro&q=' + encodeURIComponent(_buscarNomCompleto) + '&_t=' + Date.now())
        .then(function(r){ return r.text(); })
        .then(function(txt){
          var res;
          try { res = JSON.parse(txt); } catch(e){ return; }
          if(!res.ok || !res.data || !res.data.length) return;
          if(res.data.length !== 1) return;
          var cedula = res.data[0].cedula;
          if(!cedula) return;
          T.cedula = cedula;
          // Intentar llenar el campo cada 100ms hasta lograrlo
          var _tries = 0;
          var _watch = setInterval(function(){
            _tries++;
            var cedEl = document.getElementById('inp-ced');
            if(cedEl) { cedEl.value = cedula; clearInterval(_watch); }
            else if(_tries > 30) { clearInterval(_watch); }
          }, 100);
        })
        .catch(function(){});
    }
  }, 100);
}

    'SUNSU-29':'x3 Faciales Mixtos','SUNSU-44':'x3 Facial Reset 3x1','SUNSU-45':'x3 Facial Domo de Oxígeno',
    'SUNSU-46':'x3 Facial Peeling Marino','SUNSU-47':'x3 Facial de Geisha','SUNSU-53':'x3 Facial de Ginseng',
    'SUNSU-55':'x3 Glass Skin + Facial Advance',
    'SUNSU-23':'x6 Facial S.O.S','SUNSU-24':'x6 Facial Reparación','SUNSU-25':'x6 7 Pieles',
    'SUNSU-26':'x6 Facial Gold-Aging','SUNSU-27':'x6 Facial Porcelana','SUNSU-28':'x6 Facial Rice Flow',
    'SUNSU-30':'x6 Faciales Mixtos','SUNSU-48':'x6 Facial Reset 3x1','SUNSU-49':'x6 Facial Domo de Oxígeno',
    'SUNSU-50':'x6 Facial Peeling Marino','SUNSU-51':'x6 Facial de Geisha','SUNSU-54':'x6 Facial de Ginseng',
    'SUNSU-56':'x6 Glass Skin + Facial Advance',
  };
  fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vT6AYF-2t0aL3Lxdd8A0NZvZzJnHu2CYjHeMUJMn9YI3Ju7_ni-uQ6ez5c47susgfrdePbOpwliwNOc/pub?gid=700879063&single=true&output=csv')
    .then(function(r){return r.text();})
    .then(function(csv){
      var lines=csv.split('\n');
      if(lines.length<2){toast('Catálogo vacío','#B86B6B');return;}

      // ── Detectar índices de columnas leyendo la fila de headers (fila 1, índice 0) ──
      // La hoja tiene fila 0 = título, fila 1 = headers reales
      var headerLine=lines.length>1?parseCsvLine(lines[1]):[];
      var iSku=-1,iNom=-1,iTot=-1,iSub=-1,iCom=-1;
      for(var h=0;h<headerLine.length;h++){
        var hv=(headerLine[h]||'').trim().toUpperCase().replace(/"/g,'');
        if(hv==='SKU') iSku=h;
        else if(hv.indexOf('PRODUCTO')>=0||hv.indexOf('SERVICIO')>=0) iNom=h;
        else if(hv.indexOf('TOTAL CON IVA')>=0||hv==='TOTAL') iTot=h;
        else if(hv==='SUBTOTAL') iSub=h;
        else if(hv.indexOf('COMI')>=0) iCom=h;
      }
      // Fallbacks si los headers no encontraron (estructura por defecto del catálogo)
      if(iSku<0) iSku=0;
      if(iNom<0) iNom=1;
      if(iTot<0) iTot=5;
      if(iSub<0) iSub=3;
      var iActivo=9; // col J (index 9) = ACTIVO checkbox

      var nF=[],nE=[],nP3=[],nP6=[],nHT=[],nAS=[],nML=[],nPH=[],nJN=[];

      // Datos inician en fila 2 (saltar título + headers)
      var startRow=2;
      for(var i=startRow;i<lines.length;i++){
        if(!lines[i].trim())continue;
        var cols=parseCsvLine(lines[i]);
        if(!cols[iSku])continue;
        var sku=cols[iSku].trim().replace(/"/g,'');
        if(!sku||sku==='SKU')continue;
        var nom=NOMBRES[sku]||(cols[iNom]||'').trim().replace(/"/g,'');

        // Check activo — col J. Empty = active, FALSE/0 = inactive
        var activoRaw=(cols[iActivo]||'').trim().replace(/"/g,'').toUpperCase();
        var isActivo=activoRaw!=='FALSE'&&activoRaw!=='0'&&activoRaw!=='FALSO';

        // Precio: preferir TOTAL CON IVA, luego SUBTOTAL
        var rawTot=(cols[iTot]||'').replace(/"/g,'').replace(/,/g,'').trim();
        var rawSub=(cols[iSub]||'').replace(/"/g,'').replace(/,/g,'').trim();
        var p=parseFloat(rawTot)||parseFloat(rawSub)||0;

        if(p===0) continue; // saltar filas sin precio

        if(FACS.indexOf(sku)>=0)       {if(isActivo)nF.push({sku:sku,n:nom,p:p,com:C3.indexOf(sku)>=0?3:2});}
        else if(EXTS.indexOf(sku)>=0)  {if(isActivo)nE.push({sku:sku,n:nom,t:p});}
        else if(P3S.indexOf(sku)>=0)   {if(isActivo)nP3.push({sku:sku,n:nom,p:p});}
        else if(P6S.indexOf(sku)>=0)   {if(isActivo)nP6.push({sku:sku,n:nom,p:p});}
        else if(sku.indexOf('-HT-')>=0) {if(isActivo)nHT.push({sku:sku,n:nom,p:p});}
        else if(sku.indexOf('-AS-')>=0) {if(isActivo)nAS.push({sku:sku,n:nom,p:p});}
        else if(sku.indexOf('-ML-')>=0) {if(isActivo)nML.push({sku:sku,n:nom,p:p});}
        else if(sku.indexOf('-PH-')>=0) {if(isActivo)nPH.push({sku:sku,n:nom,p:p});}
        else if(sku.indexOf('-JN-')>=0) {if(isActivo)nJN.push({sku:sku,n:nom,p:p});}
      }

      if(nF.length){FACIALES.length=0;nF.forEach(function(x){FACIALES.push(x);});}
      if(nE.length){EXTRAS.length=0;nE.forEach(function(x){EXTRAS.push(x);});}
      if(nP3.length){PAQ3.length=0;nP3.forEach(function(x){PAQ3.push(x);});}
      if(nP6.length){PAQ6.length=0;nP6.forEach(function(x){PAQ6.push(x);});}
      PROVS.forEach(function(pv){
        var arr=pv.id==='ht'?nHT:pv.id==='as'?nAS:pv.id==='ml'?nML:pv.id==='ph'?nPH:pv.id==='jn'?nJN:[];
        if(arr.length){pv.prods.length=0;arr.forEach(function(x){pv.prods.push(x);});}
      });

      // Re-render ticket si está activo
      var activeTab=document.querySelector('.tab.active');
      if(activeTab&&activeTab.textContent.indexOf('Ticket')>=0){
        var c=document.getElementById('content');
        if(c) renderTicket(c);
      }
    })
    .catch(function(e){toast('Catálogo error: '+e.message,'#B86B6B');});
}

// Cache de citas por día: { 'hoy': {data:[], ts:12345}, 'ayer': ..., 'manana': ... }
window._citasCache = window._citasCache || {};
var CITAS_TTL = 2 * 60 * 1000; // 2 minutos

function verCitas(c,o,forzar){
  var dias=[['Ayer',-1],['Hoy',0],['Mañana',1]];
  var hoy=new Date();
  var dia=new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate()+o);
  var dl=dia.toLocaleDateString('es-EC',{weekday:'long',day:'numeric',month:'long'});
  var diaNom=o===-1?'ayer':o===1?'manana':'hoy';

  var nav='<div style="display:flex;gap:8px;padding:14px 14px 0">';
  dias.forEach(function(d){
    var a=d[1]===o;
    nav+='<button onclick="verCitas(document.getElementById(\'content\'),'+d[1]+')" style="flex:1;padding:9px;border-radius:10px;border:1.5px solid '+(a?'var(--navy)':'#ECEEF4')+';background:'+(a?'var(--navy)':'white')+';color:'+(a?'white':'var(--gray)')+';font-size:0.78rem;font-weight:700;cursor:pointer">'+d[0]+'</button>';
  });
  nav+='</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 14px 10px">'
    +'<div style="font-size:0.7rem;color:var(--gray);text-transform:capitalize">'+dl+'</div>'
    +'<button onclick="verCitas(document.getElementById(\'content\'),'+o+',true)" style="background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue);padding:4px 10px;border-radius:8px;font-size:0.68rem;font-weight:700;cursor:pointer">🔄 Actualizar</button>'
    +'</div>';
  c.innerHTML=nav+'<div id="cb" style="padding:0 14px 14px"><div style="text-align:center;padding:30px;color:var(--gray)"><div style="font-size:1.5rem;margin-bottom:8px">⏳</div>Cargando citas...</div></div>';

  var body=function(){return document.getElementById('cb');};

  // Usar cache si existe y no expiró y no es forzado
  var cached=window._citasCache[diaNom];
  if(!forzar && cached && (Date.now()-cached.ts) < CITAS_TTL){
    var bd=body(); if(bd) _renderCitasList(bd, cached.data, diaNom);
    return;
  }

  fetch(APPS_SCRIPT_URL+'?action=getCitas&dia='+diaNom)
    .then(function(r){return r.json();})
    .then(function(data){
      if(!body()) return;
      if(data.error){
        body().innerHTML='<div style="background:var(--gold-l);border-radius:12px;padding:20px;text-align:center">'
          +'<div style="font-size:1.5rem;margin-bottom:8px">📅</div>'
          +'<div style="font-size:0.84rem;font-weight:700;color:var(--gold);margin-bottom:6px">Sin datos</div>'
          +'<div style="font-size:0.72rem;color:var(--gray)">'+data.error+'</div></div>';
        return;
      }
      // Guardar en cache
      window._citasCache[diaNom]={data:data, ts:Date.now()};
      _renderCitasList(body(), data, diaNom);
    })
    .catch(function(err){
      if(body()) body().innerHTML=
        '<div style="background:var(--red-l);border-radius:12px;padding:20px;text-align:center">'
        +'<div style="font-size:0.84rem;font-weight:700;color:var(--red);margin-bottom:6px">Error cargando citas</div>'
        +'<div style="font-size:0.72rem;color:var(--gray)">'+err.message+'</div>'
        +'<button onclick="verCitas(document.getElementById(\'content\'),'+o+',true)" style="margin-top:12px;padding:8px 16px;background:#2D3B6B;color:white;border:none;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer">🔄 Reintentar</button>'
        +'</div>';
    });
}

function _renderCitasList(bd, data, diaNom){
  var o=diaNom==='ayer'?-1:diaNom==='manana'?1:0;
      if(!Array.isArray(data)){
        bd.innerHTML='<div style="padding:20px;color:var(--gray);text-align:center">Sin citas disponibles</div>';
        return;
      }
      var isAdmin=CU.role==='admin'||CU.role==='admin_master'||CU.role==='reception';
      var citas=data
        .filter(function(a){return !a.canceled;})
        .sort(function(a,b){return new Date(a.datetime)-new Date(b.datetime);});
      if(!isAdmin) citas=citas.filter(function(ci){
        return (ci.calendar||'').toLowerCase().indexOf(CU.short.toLowerCase().split(' ')[0])>=0;
      });
      if(!citas.length){
        bd.innerHTML='<div style="padding:32px;text-align:center;color:var(--gray)"><div style="font-size:2rem;margin-bottom:8px">🗓</div>No hay citas</div>';
        return;
      }
      var h='<div style="font-size:0.72rem;color:var(--gray);margin-bottom:10px;font-weight:600">'+citas.length+' cita'+(citas.length!==1?'s':'')+(isAdmin?'':' para ti')+'</div>';
      citas.forEach(function(apt){
        var dt=new Date(apt.datetime);
        var hora=dt.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit',hour12:true});
        var nombre=((apt.firstName||'')+' '+(apt.lastName||'')).trim();
        var nueva=(apt.type||'').toUpperCase().indexOf('PRIMERA')>=0;
        var ok=apt.labels&&apt.labels.some(function(l){return l.name==='COMPLETADO';});
        var col=ok?'#ccc':nueva?'#C4A45A':'#6A9E7A';
        h+='<div style="background:white;border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid '+col+';box-shadow:0 1px 4px rgba(0,0,0,0.06);opacity:'+(ok?'0.6':'1')+'">';
        h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
        h+='<div style="flex:1">';
        h+='<div style="font-size:1rem;font-weight:800;color:#2D3B6B">'+hora+'</div>';
        h+='<div style="font-size:0.82rem;font-weight:700;color:#333;margin-top:2px">'+nombre+'</div>';
        if(isAdmin) h+='<div style="font-size:0.68rem;color:#7A8499">'+apt.calendar+'</div>';
        h+='<div style="font-size:0.68rem;color:#7A8499">⏱ '+apt.duration+' min</div>';
        h+='</div>';
        h+='<span style="background:'+(nueva?'#FBF6EC':'#EDF5EF')+';color:'+(nueva?'#C4A45A':'#6A9E7A')+';font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:8px;margin-left:8px;white-space:nowrap">'+(nueva?'🆕 Nueva':'⭐ Antigua')+'</span>';
        h+='</div>';
        if(apt.notes) h+='<div style="font-size:0.72rem;color:#333;background:#F3F0FA;border-radius:8px;padding:7px 10px;margin-top:9px">📌 '+apt.notes+'</div>';
        if(o!==1&&!ok) h+='<button onclick="irATicket(this)" data-nom="'+apt.firstName+'" data-ape="'+apt.lastName+'" data-tel="'+(apt.phone||'')+'" style="width:100%;padding:10px;background:#2D3B6B;color:white;border:none;border-radius:10px;font-size:0.82rem;font-weight:700;cursor:pointer;margin-top:10px">🎫 Ticket para '+apt.firstName+'</button>';
        if(ok) h+='<div style="text-align:center;font-size:0.75rem;color:#aaa;margin-top:8px">✓ Completada</div>';
        h+='</div>';
      });
      bd.innerHTML=h;
}

// ══════ ELIMINAR TICKET (admin) — borra la fila completa en TICKET_FICHA ══════
function eliminarTicket(tkRow){
  if(!(CU&&(CU.role==='admin'||CU.role==='admin_master'))){toast('Solo administradores','#B86B6B');return;}
  var t=_histData?_histData.find(function(x){return x.tkRow===tkRow;}):null;
  var nombreT=t?((t.nombre||'')+' '+(t.apellido||'')).trim():'';
  if(!confirm('🗑️ ¿Eliminar el ticket #'+tkRow+(nombreT?' de '+nombreT:'')+'?\n\nSe borra TODA la fila en el sheet: facial, productos, extras y comisiones de ese ticket.\nEsta acción no se puede deshacer desde el app.')) return;
  toast('⏳ Eliminando...','var(--navy)');
  fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({accion:'eliminarTicket', tkRow:tkRow, nombre:t?(t.nombre||''):'', apellido:t?(t.apellido||''):'', usuario:CU?CU.name:'—'})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){
      toast('🗑️ Ticket eliminado','var(--green)');
      // Las filas de abajo se corren una posición: recargar datos y refrescar la vista
      _histData=null;
      var c=document.getElementById('content');
      if(document.getElementById('buscar-res')){
        window._buscarPrefill=((document.getElementById('buscar-q')||{}).value||'');
        renderBuscar(c);
      } else {
        renderHistorial(c);
      }
    } else {
      toast('❌ '+(d.error||'Error'),'#B86B6B');
    }
  })
  .catch(function(){toast('❌ Error de conexión','#B86B6B');});
}

function guardarEdicionTicket(tkRow){
  var btn=document.getElementById('et-btn');
  var msg=document.getElementById('et-msg');
  var get=function(id){var el=document.getElementById(id);return el?el.value:'';};

  // Build extras string (col W) same format as enviarTicket
  var extrasArr=[];
  EXTRAS.forEach(function(ex){
    var ck=document.getElementById('ex-'+ex.sku);
    if(ck&&ck.checked){
      var cort=document.getElementById('ec-'+ex.sku);
      var str=ex.sku+' '+ex.n;
      if(cort&&cort.checked) str+=' [CORTESIA]';
      extrasArr.push(str);
    }
  });
  var extrasStr=extrasArr.join(' | ');

  // Build productos object same as enviarTicket
  var PROD_COL_MAP={
    'SUNSU-HT-002':25,'SUNSU-HT-003':26,'SUNSU-HT-004':27,'SUNSU-HT-006':28,'SUNSU-HT-007':29,
    'SUNSU-HT-011':30,'SUNSU-HT-012':31,'SUNSU-HT-013':32,'SUNSU-HT-014':33,
    'SUNSU-AS-001':34,'SUNSU-AS-002':35,'SUNSU-AS-003':36,'SUNSU-AS-004':37,
    'SUNSU-AS-005':38,'SUNSU-AS-006':39,'SUNSU-AS-007':40,
    'SUNSU-ML-001':41,'SUNSU-ML-002':42,'SUNSU-ML-003':43,'SUNSU-ML-004':44,
    'SUNSU-ML-005':45,'SUNSU-ML-007':46,'SUNSU-ML-008':47,'SUNSU-ML-009':48,
    'SUNSU-ML-010':49,'SUNSU-ML-011':50,
    'SUNSU-PH-001':51,'SUNSU-PH-002':52,'SUNSU-PH-003':53,'SUNSU-PH-004':54,
    'SUNSU-PH-007':55,'SUNSU-PH-008':56,
    'SUNSU-JN-001':57,'SUNSU-JN-002':58,'SUNSU-JN-003':59,'SUNSU-JN-004':60,
    'SUNSU-BV-001':61,
    'SUNSU-SU-001':62,'SUNSU-SU-002':63,'SUNSU-SU-003':64,'SUNSU-SU-004':65,
    'SUNSU-SU-005':66,'SUNSU-SU-006':67,'SUNSU-SU-007':68,
    'SUNSU-SU-008':69,'SUNSU-SU-009':70,
  };
  var productosPayload={};
  PROVS.forEach(function(pv){pv.prods.forEach(function(p){
    var qEl=document.getElementById('pq-'+p.sku);
    var q=qEl?parseInt(qEl.value)||0:0;
    if(q>0) productosPayload[p.sku]=q;
  });});

  // Facial text
  var facSku=get('et-facial');
  var facObj=facSku?FACIALES.find(function(f){return f.sku===facSku;}):null;
  var facTxt=facObj?(facSku+' '+facObj.n):'';

  // Pack3 text
  var p3Sku=get('et-pack3');
  var p3Obj=p3Sku?PAQ3.find(function(p){return p.sku===p3Sku;}):null;
  var p3Txt=p3Obj?(p3Sku+' '+p3Obj.n):'';

  // Pack6 text
  var p6Sku=get('et-pack6');
  var p6Obj=p6Sku?PAQ6.find(function(p){return p.sku===p6Sku;}):null;
  var p6Txt=p6Obj?(p6Sku+' '+p6Obj.n):'';

  // GC colS
  var gcTipo=get('et-gc-tipo').trim();
  var gcCod=get('et-gc-cod').trim();
  var gcNota=get('et-gc-nota').trim();
  var colS=gcTipo?(gcTipo+(gcCod?', '+gcCod:'')+(gcNota?', '+gcNota:'')):'';

  var payload={
    accion:'editarTicket',
    tkRow: tkRow,
    cedula:   get('et-ced'),
    nombre:   get('et-nom'),
    apellido: get('et-ape'),
    facial:   facTxt,
    pack3:    p3Txt,
    pack6:    p6Txt,
    extras:   extrasStr,
    cobro:    get('et-cobro'),
    estimado: parseFloat(get('et-total'))||0,
    fechaRetorno: get('et-fret'),
    colR:     get('et-colR'),
    colS:     colS,
    recomendaciones: get('et-recom'),
    notas:    get('et-notas'),
    productos: productosPayload,
    prodColMap: PROD_COL_MAP,
  };

  btn.disabled=true; btn.textContent='⏳ Guardando...';
  fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
  .then(function(r){return r.json();})
  .then(function(d){
    btn.disabled=false; btn.textContent='💾 Guardar cambios';
    if(d.ok){
      msg.style.display='block'; msg.style.background='var(--green-l)'; msg.style.color='var(--green)';
      msg.textContent='✅ Guardado correctamente';
      if(_histData){
        var t=_histData.find(function(x){return x.tkRow===tkRow;});
        if(t){t.cedula=payload.cedula;t.nombre=payload.nombre;t.apellido=payload.apellido;
          t.recomendaciones=payload.recomendaciones;t.notas=payload.notas;
          t.facial=payload.facial;t.pack3=payload.pack3;t.pack6=payload.pack6;
          t.estimado=String(payload.estimado);t.extras=payload.extras;t.colS=payload.colS;t.colR=payload.colR;}
      }
      setTimeout(function(){var ov=document.getElementById('edit-overlay');if(ov)ov.remove();},1200);
    } else {
      msg.style.display='block'; msg.style.background='var(--red-l)'; msg.style.color='var(--red)';
      msg.textContent='❌ '+(d.error||'Error al guardar');
    }
  })
  .catch(function(){
    btn.disabled=false; btn.textContent='💾 Guardar cambios';
    msg.style.display='block'; msg.style.background='var(--red-l)'; msg.style.color='var(--red)';
    msg.textContent='❌ Error de conexión';
  });
}

function toggleExclusion(tkRow, tipo){
  var colMap={facial:71, paquete:72, producto:73, extras:74}; // BS/BT/BU/BV — solo fallback; el backend resuelve por 'tipo' leyendo encabezados
  var idMap={facial:'excl-fac-', paquete:'excl-paq-', producto:'excl-prod-', extras:'excl-ext-'};
  var labelMap={facial:'💆 Facial', paquete:'📋 Paquete', producto:'🧴 Producto', extras:'✨ Extras'};
  var col=colMap[tipo];
  var btn=document.getElementById(idMap[tipo]+tkRow);
  if(!btn) return;

  // Toggle current state
  var isActive=btn.style.borderColor.indexOf('red')>=0||btn.dataset.active==='1';
  var newVal=!isActive;
  btn.dataset.active=newVal?'1':'0';

  // Update button style
  if(newVal){
    btn.style.borderColor='var(--red)'; btn.style.background='var(--red-l)'; btn.style.color='var(--red)';
    btn.textContent='✓ '+labelMap[tipo];
  } else {
    btn.style.borderColor='var(--gray-l)'; btn.style.background='white'; btn.style.color='var(--gray)';
    btn.textContent=labelMap[tipo];
  }

  // Save to sheet
  toast('Guardando...','var(--navy)');
  fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({accion:'excluirComision', tkRow:tkRow, tipo:tipo, col:col, valor:newVal})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){
      toast(newVal?'❌ Excluido de comisión':'✅ Incluido en comisión', newVal?'#B86B6B':'var(--green)');
      // Update local cache
      if(_histData){
        var t=_histData.find(function(x){return x.tkRow===tkRow;});
        if(t){
          if(tipo==='facial') t.exclFacial=newVal;
          else if(tipo==='paquete') t.exclPaquete=newVal;
          else if(tipo==='producto') t.exclProducto=newVal;
          else if(tipo==='extras') t.exclExtras=newVal;
        }
      }
    } else { toast('Error: '+(d.error||''),'#B86B6B'); }
  })
  .catch(function(){ toast('Error de conexión','#B86B6B'); });
}

function renderInventario(c){
  c.innerHTML='<div style="font-size:0.88rem;font-weight:800;color:var(--navy);margin-bottom:12px">📊 Inventario</div>'
    +'<div class="loading"><div class="spinner"></div>Cargando inventario...</div>';
  // Fetch both inventory and catalog to filter by activo
  Promise.all([
    fetch(APPS_SCRIPT_URL+'?action=getInventario').then(function(r){return r.text();}),
    fetch(APPS_SCRIPT_URL+'?action=getCatalogo').then(function(r){return r.text();})
  ]).then(function(results){
    var d,cat;
    try{d=JSON.parse(results[0]);}catch(e){d={error:results[0].slice(0,100)};}
    try{cat=JSON.parse(results[1]);}catch(e){cat=[];}
    if(d.error){c.innerHTML='<div class="card" style="color:var(--red)">❌ '+d.error+'</div>';return;}

    // Build active SKU set from catalog col J
    var activoCat={};
    if(Array.isArray(cat)) cat.forEach(function(it){activoCat[it.sku]=it.activo===true;});

    // Filter: only show items where catalog says activo=true (or not in catalog)
    var items=(d.items||[]).filter(function(it){
      if(activoCat.hasOwnProperty(it.sku)) return activoCat[it.sku]===true;
      return true; // not in catalog = show
    });
      if(!items.length){c.innerHTML='<div class="card">Sin datos</div>';return;}
      var prefixNames={'HT':'HT — ANUA','AS':'AS — Eyenlip','ML':'ML — Dr.esthe','PH':'PH — APHLORA','JN':'JN — Varios','BV':'BV — Bruno Vassari','SU':'SU — SUNSU'};
      var grupos={};
      items.forEach(function(it){
        var m=it.sku.match(/SUNSU-([A-Z]+)-/);
        var prefix=m?m[1]:'OTROS';
        var gn=prefixNames[prefix]||('CÓDIGOS '+prefix);
        if(!grupos[gn]) grupos[gn]=[];
        grupos[gn].push(it);
      });
      var sinStock=items.filter(function(i){return i.alerta==='SIN STOCK';}).length;
      var bajo=items.filter(function(i){return i.alerta==='STOCK BAJO';}).length;
      var ok=items.filter(function(i){return i.alerta==='OK';}).length;
      var html='<div style="font-size:0.88rem;font-weight:800;color:var(--navy);margin-bottom:12px">📊 Inventario</div>'
        +'<div style="display:flex;gap:8px;margin-bottom:14px">'
        +'<div style="flex:1;background:#FEE2E2;border-radius:10px;padding:10px;text-align:center"><div style="font-size:1.2rem;font-weight:900;color:#C00">'+sinStock+'</div><div style="font-size:0.6rem;color:#C00;font-weight:700">SIN STOCK</div></div>'
        +'<div style="flex:1;background:#FFF9E6;border-radius:10px;padding:10px;text-align:center"><div style="font-size:1.2rem;font-weight:900;color:#C4943A">'+bajo+'</div><div style="font-size:0.6rem;color:#C4943A;font-weight:700">STOCK BAJO</div></div>'
        +'<div style="flex:1;background:#E8F8EE;border-radius:10px;padding:10px;text-align:center"><div style="font-size:1.2rem;font-weight:900;color:#2E7D52">'+ok+'</div><div style="font-size:0.6rem;color:#2E7D52;font-weight:700">OK</div></div>'
        +'</div>';
      Object.keys(grupos).forEach(function(gn,gi){
        var gItems=grupos[gn];
        var gid='inv-grp-'+gi;
        var gSin=gItems.filter(function(i){return i.alerta==='SIN STOCK';}).length;
        var gBajo=gItems.filter(function(i){return i.alerta==='STOCK BAJO';}).length;
        var aLabel=gSin>0?(gSin+' sin stock'):gBajo>0?(gBajo+' stock bajo'):'✅ OK';
        var aCol=gSin>0?'#FEE2E2':gBajo>0?'#FFF9E6':'#E8F8EE';
        var aTxt=gSin>0?'#C00':gBajo>0?'#C4943A':'#2E7D52';
        html+='<div style="background:white;border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)">'
          +'<div onclick="toggleInvGrupo(\''+gid+'\')" style="background:var(--navy);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer">'
          +'<div style="font-size:0.82rem;font-weight:800;color:white">'+gn+'</div>'
          +'<div style="display:flex;align-items:center;gap:8px">'
          +'<span style="font-size:0.65rem;font-weight:700;background:'+aCol+';color:'+aTxt+';padding:2px 8px;border-radius:6px">'+aLabel+'</span>'
          +'<span id="inv-arrow-'+gid+'" style="color:white;font-size:0.75rem">▶</span>'
          +'</div></div>'
          +'<div id="'+gid+'" style="display:none">'
          +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:var(--cream)">'
          +'<th style="padding:7px 10px;font-size:0.6rem;text-align:left;color:var(--gray);font-weight:700">SKU</th>'
          +'<th style="padding:7px 10px;font-size:0.6rem;text-align:left;color:var(--gray);font-weight:700">PRODUCTO</th>'
          +'<th style="padding:7px 10px;font-size:0.6rem;text-align:center;color:var(--gray);font-weight:700">STOCK</th>'
          +'<th style="padding:7px 10px;font-size:0.6rem;text-align:center;color:var(--gray);font-weight:700">MÍN</th>'
          +'<th style="padding:7px 10px;font-size:0.6rem;text-align:center;color:var(--gray);font-weight:700">ALERTA</th>'
          +'</tr></thead><tbody>';
        gItems.forEach(function(it,i){
          var ac=it.alerta==='SIN STOCK'?'#C00':it.alerta==='STOCK BAJO'?'#C4943A':it.alerta==='OK'?'#2E7D52':'#aaa';
          var ab=it.alerta==='SIN STOCK'?'#FEE2E2':it.alerta==='STOCK BAJO'?'#FFF9E6':it.alerta==='OK'?'#E8F8EE':'transparent';
          var ai=it.alerta==='SIN STOCK'?'🔴':it.alerta==='STOCK BAJO'?'🟡':it.alerta==='OK'?'🟢':'⚪';
          html+='<tr style="background:'+(i%2===0?'white':'var(--cream)')+';border-bottom:1px solid var(--cream-d)">'
            +'<td style="padding:7px 10px;font-size:0.6rem;font-family:monospace;color:#666">'+it.sku+'</td>'
            +'<td style="padding:7px 10px;font-size:0.7rem;color:var(--navy)">'+it.nombre+'</td>'
            +'<td style="padding:7px 10px;text-align:center;font-size:0.88rem;font-weight:900;color:'+(it.stock===0?'#C00':it.stock<=it.minimo?'#C4943A':'var(--navy)')+'">'+it.stock+'</td>'
            +'<td style="padding:7px 10px;text-align:center;font-size:0.72rem;color:var(--gray)">'+it.minimo+'</td>'
            +'<td style="padding:7px 6px;text-align:center"><span style="font-size:0.58rem;font-weight:700;color:'+ac+';background:'+ab+';padding:2px 6px;border-radius:5px">'+ai+' '+it.alerta+'</span></td>'
            +'</tr>';
        });
        html+='</tbody></table></div></div>';
      });
      c.innerHTML=html;
    })
    .catch(function(e){c.innerHTML='<div class="card" style="color:var(--red)">❌ Error: '+e.message+'</div>';});
}

function toggleInvGrupo(gid){
  var body=document.getElementById(gid);
  var arrow=document.getElementById('inv-arrow-'+gid);
  if(!body) return;
  var open=body.style.display==='none'||body.style.display==='';
  body.style.display=open?'block':'none';
  if(arrow) arrow.textContent=open?'▼':'▶';
}

function renderEntradas(c){

    +'<div class="loading"><div class="spinner"></div>Cargando órdenes...</div>';

    .then(function(r){return r.text();})
    .then(function(txt2){
      var d; try{d=JSON.parse(txt2);}catch(e){d={error:txt2.slice(0,100)};}
      if(d.error){c.innerHTML='<div class="card" style="color:var(--red)">❌ '+d.error+'</div>';return;}

          +'</div></div>'
          +'<div id="'+gid+'" style="display:none;padding:10px 14px">';
        g.items.forEach(function(it){

            +'<div style="font-size:0.6rem;color:var(--gray);font-family:monospace">'+it.sku+'</div></div>'
            +'<div style="font-size:0.7rem;color:var(--gray)">Pedido: <strong style="color:var(--navy);font-size:0.82rem">'+it.pedida+'</strong></div>'
            +'</div>'
            +'<div id="ebtn-'+it.fila+'">'
            +(marcado
              ?'<span style="font-size:0.72rem;font-weight:700;color:'+eColor+'">'+eLabel+'</span>'
              :'<div style="display:flex;gap:6px">'
               +'<button data-f="'+it.fila+'" data-p="'+it.pedida+'" data-t="completo" onclick="registrarEntradaBtn(this)" style="flex:1;padding:8px 4px;background:var(--green);color:white;border:none;border-radius:9px;font-size:0.68rem;font-weight:700;cursor:pointer">✅ Completo</button>'
               +'<button data-f="'+it.fila+'" data-p="'+it.pedida+'" data-t="parcial" onclick="mostrarParcialBtn(this)" style="flex:1;padding:8px 4px;background:var(--gold);color:white;border:none;border-radius:9px;font-size:0.68rem;font-weight:700;cursor:pointer">⚠️ Parcial</button>'
               +'<button data-f="'+it.fila+'" data-p="'+it.pedida+'" data-t="nollego" onclick="registrarEntradaBtn(this)" style="flex:1;padding:8px 4px;background:var(--red);color:white;border:none;border-radius:9px;font-size:0.68rem;font-weight:700;cursor:pointer">❌ No llegó</button>'
               +'</div>'
            )
            +'</div></div>';
        });
        html+='</div></div>';
      });
      window._gruposEntrada=gruposActivos; // save for PDF
      c.innerHTML=html;
    })
    .catch(function(e){c.innerHTML='<div class="card" style="color:var(--red)">❌ Error: '+e.message+'</div>';});
}

function cerrarPedidoGrupo(btn){
  var gname=btn.getAttribute('data-gname');
  if(!window._gruposEntrada||!window._gruposEntrada[gname]) return;
  var items=window._gruposEntrada[gname].items;
  var pendientes=items.filter(function(it){
    return it.recibida===''||it.recibida===null||it.recibida===undefined;
  });
  if(pendientes.length>0){
    toast('⚠️ Faltan '+pendientes.length+' producto(s) por marcar','#C4943A');
    return;
  }
  // All marked — remove from view
  delete window._gruposEntrada[gname];
  // Find and hide the card
  var allCards=document.querySelectorAll('[data-gname="'+gname+'"]');
  allCards.forEach(function(el){
    var card=el.closest('[style*="border-radius:14px"]');
    if(card){card.style.transition='opacity 0.3s';card.style.opacity='0';setTimeout(function(){if(card.parentNode)card.parentNode.removeChild(card);},350);}
  });
  toast('✅ Pedido '+gname+' cerrado','var(--green)');
}

function toggleGrupoEntrada(gid){
  var body=document.getElementById(gid);
  var arrow=document.getElementById('arrow-'+gid);
  if(!body) return;
  var open=body.style.display==='none'||body.style.display==='';
  body.style.display=open?'block':'none';
  if(arrow) arrow.textContent=open?'▼':'▶';
}

  var hora=ahora.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',timeZone:'America/Guayaquil'});

    +'.top{border-bottom:3px solid #1A2744;padding-bottom:12px;margin-bottom:16px;display:flex;justify-content:space-between}'

    +'.right{text-align:right;font-size:11px;color:#555}'

    +'.lbl{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:2px}'
    +'.val{font-size:12px;font-weight:600;color:#1A2744}'
    +'table{width:100%;border-collapse:collapse;margin-bottom:28px}'
    +'thead tr{background:#1A2744}'
    +'th{color:white;padding:7px 8px;font-size:10px;text-align:left;text-transform:uppercase}'
    +'td{padding:6px 8px;font-size:11px;border-bottom:1px solid #eee}'
    +'tr:nth-child(even){background:#fafafa}'
    +'.sigs{display:flex;gap:40px;justify-content:center;margin-top:40px}'
    +'.sig{width:200px;text-align:center}'
    +'.sig-line{border-top:1.5px solid #aaa;padding-top:6px;margin-top:36px;font-size:10px;color:#777}'
    +'</style></head><body>'
    +'<div class="top">'
    +'<div><div class="logo">&#xC21C;&#xC218; <em>SUNSU</em> SPA</div>'
    +'<div style="font-size:10px;color:#888;margin-top:3px">Acta de Entrega y Recepci&#xF3;n</div></div>'
    +'<div class="right"><strong style="font-size:13px">'+fecha+'</strong><br>'+hora+'</div>'
    +'</div>'
    +'<div class="info">'
    +'<div><div class="lbl">Proveedor</div><div class="val">'+proveedorReal+'</div></div>'
    +'<div><div class="lbl">RUC / Identificaci&#xF3;n</div><div class="val" style="border-bottom:1px solid #aaa;min-width:120px">&nbsp;</div></div>'
    +'<div><div class="lbl">Orden de Compra</div><div class="val">'+orden+'</div></div>'
    +'</div>'
    +'<table><thead><tr>'
    +'<th>SKU</th><th>Producto</th>'

// ══════ HISTORIAL DE ÓRDENES DE COMPRA (admin) ══════
function renderHistorialOC(){
  var c=document.getElementById('content');
  var isAdmin=CU&&(CU.role==='admin'||CU.role==='admin_master');
  if(!isAdmin){toast('Solo administradores','#B86B6B');return;}
  c.innerHTML='<div style="font-size:0.88rem;font-weight:800;color:var(--navy);margin-bottom:12px">📜 Historial de Órdenes de Compra</div>'
    +'<div class="loading"><div class="spinner"></div>Cargando historial...</div>';
  fetch(APPS_SCRIPT_URL+'?action=getEntradasHistorial')
    .then(function(r){return r.text();})
    .then(function(txt){
      var d; try{d=JSON.parse(txt);}catch(e){d={error:txt.slice(0,100)};}
      if(d.error){c.innerHTML='<div class="card" style="color:var(--red)">❌ '+d.error+'</div>';return;}
      var items=d.items||[];
      var prefixNames={'HT':'HT — ANUA','AS':'AS — Eyenlip','ML':'ML — Dr.esthe','PH':'PH — APHLORA','JN':'JN — Varios','BV':'BV — Bruno Vassari','SU':'SU — SUNSU'};
      var grupos={};
      items.forEach(function(it){
        var m=it.sku.match(/SUNSU-([A-Z]+)-/);
        var prefix=m?m[1]:'OTROS';
        var fam=prefixNames[prefix]||('CÓDIGOS '+prefix);
        var key=(it.orden||'SIN-OC')+'||'+fam;
        if(!grupos[key]) grupos[key]={orden:it.orden||'',fam:fam,prov:it.proveedor||fam,creada:it.creada||'',items:[]};
        if(!grupos[key].creada&&it.creada) grupos[key].creada=it.creada;
        grupos[key].items.push(it);
      });
      var keys=Object.keys(grupos);
      keys.sort(function(a,b){
        var oa=grupos[a].orden||'',ob=grupos[b].orden||'';
        if(!oa&&!ob) return 0; if(!oa) return 1; if(!ob) return -1;
        return ob.localeCompare(oa); // OC más reciente primero
      });
      var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        +'<div style="font-size:0.88rem;font-weight:800;color:var(--navy)">📜 Historial de Órdenes de Compra</div>'
        +'<button onclick="renderEntradas(document.getElementById(\'content\'))" style="padding:5px 11px;background:white;color:var(--navy);border:1.5px solid var(--navy);border-radius:9px;font-size:0.65rem;font-weight:700;cursor:pointer">← Pendientes</button>'
        +'</div>';
      if(!keys.length){
        html+='<div class="card" style="text-align:center;padding:24px;color:var(--gray)">Sin órdenes registradas</div>';
        c.innerHTML=html; return;
      }
      keys.forEach(function(key,gi){
        var g=grupos[key];
        var gid='hoc-'+gi;
        var nComp=g.items.filter(function(i){return i.estado.indexOf('Completo')>=0;}).length;
        var nParc=g.items.filter(function(i){return i.estado.indexOf('Parcial')>=0;}).length;
        var nNo=g.items.filter(function(i){return i.estado.indexOf('No llegó')>=0;}).length;
        var nPend=g.items.length-nComp-nParc-nNo;
        var resumen=(nComp?nComp+' ✅ ':'')+(nParc?nParc+' ⚠️ ':'')+(nNo?nNo+' ❌ ':'')+(nPend?nPend+' ⏳':'');
        html+='<div style="background:white;border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)">'
          +'<div style="background:var(--navy);padding:11px 14px;display:flex;justify-content:space-between;align-items:center">'
          +'<div onclick="toggleGrupoEntrada(\''+gid+'\')" style="flex:1;cursor:pointer;user-select:none">'
          +'<div style="font-size:0.85rem;font-weight:800;color:white;letter-spacing:0.5px">'+(g.orden||'SIN OC')+'</div>'
          +'<div style="font-size:0.62rem;color:rgba(255,255,255,0.6)">'+g.fam+' · '+g.items.length+' productos'+(g.creada?' · 📅 '+g.creada:'')+'</div>'
          +'</div>'
          +'<div style="display:flex;align-items:center;gap:8px">'
          +'<span style="font-size:0.62rem;font-weight:700;color:#FFD580">'+resumen.trim()+'</span>'
          +'<button data-gname="'+key+'" data-orden="'+(g.orden||'—')+'" data-prov="'+g.prov+'" data-src="hist" onclick="generarActaEntrega(this)" style="padding:4px 9px;background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.5);border-radius:7px;font-size:0.62rem;font-weight:700;cursor:pointer">📄 Acta</button>'
          +'<span id="arrow-'+gid+'" onclick="toggleGrupoEntrada(\''+gid+'\')" style="color:white;font-size:0.75rem;cursor:pointer">▶</span>'
          +'</div></div>'
          +'<div id="'+gid+'" style="display:none;padding:10px 14px">';
        g.items.forEach(function(it){
          var v=(it.recibida!==''&&it.recibida!==null&&it.recibida!==undefined)?parseFloat(it.recibida):null;
          var eLabel=v===null?'⏳ Pendiente':(v===0?'❌ No llegó':v>=it.pedida?'✅ Completo':'⚠️ Parcial '+v+'/'+it.pedida);
          var eColor=v===null?'var(--gray)':(v===0?'var(--red)':v>=it.pedida?'var(--green)':'var(--gold)');
          var quien=(it.usuario?('por '+it.usuario):'')+(it.timestamp?(' · '+it.timestamp):'');
          html+='<div style="padding:9px 0;border-bottom:1px solid var(--cream-d)">'
            +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'
            +'<div style="flex:1;min-width:0"><div style="font-size:0.74rem;font-weight:700;color:var(--navy)">'+it.nombre+'</div>'
            +'<div style="font-size:0.6rem;color:var(--gray);font-family:monospace">'+it.sku+' · Pedido: '+it.pedida+'</div></div>'
            +'<div style="text-align:right;flex-shrink:0">'
            +'<div id="hst-'+it.fila+'"><span style="font-size:0.72rem;font-weight:700;color:'+eColor+'">'+eLabel+'</span>'
            +'<div style="font-size:0.55rem;color:var(--gray)">'+quien+'</div></div>'
            +'</div>'
            +'<div id="hedit-'+it.fila+'" style="flex-shrink:0"><button onclick="editarEntregaHist('+it.fila+','+it.pedida+')" style="padding:6px 9px;background:var(--cream);border:none;border-radius:8px;font-size:0.75rem;cursor:pointer">✏️</button></div>'
            +'</div></div>';
        });
        html+='</div></div>';
      });
      window._gruposHistOC=grupos; // para regenerar actas
      c.innerHTML=html;
    })
    .catch(function(e){c.innerHTML='<div class="card" style="color:var(--red)">❌ Error: '+e.message+'</div>';});
}

function editarEntregaHist(fila,pedida){
  var d=document.getElementById('hedit-'+fila); if(!d) return;
  d.innerHTML='<div style="display:flex;gap:4px;align-items:center">'
    +'<input type="number" id="hi-'+fila+'" min="0" placeholder="Cant." style="width:64px;padding:6px 8px;border:1.5px solid var(--navy);border-radius:8px;font-size:0.78rem;outline:none;font-family:inherit">'
    +'<button onclick="guardarEdicionEntrega('+fila+','+pedida+')" style="padding:6px 10px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:0.68rem;font-weight:700;cursor:pointer">✓</button>'
    +'<button onclick="cancelarEdicionEntrega('+fila+','+pedida+')" style="padding:6px 8px;background:var(--cream);color:var(--gray);border:none;border-radius:8px;font-size:0.68rem;cursor:pointer">✕</button>'
    +'</div>';
  setTimeout(function(){var i=document.getElementById('hi-'+fila);if(i)i.focus();},50);
}

function cancelarEdicionEntrega(fila,pedida){
  var d=document.getElementById('hedit-'+fila); if(!d) return;
  d.innerHTML='<button onclick="editarEntregaHist('+fila+','+pedida+')" style="padding:6px 9px;background:var(--cream);border:none;border-radius:8px;font-size:0.75rem;cursor:pointer">✏️</button>';
}

function guardarEdicionEntrega(fila,pedida){
  var inp=document.getElementById('hi-'+fila);
  if(!inp||inp.value===''){toast('Escribe la cantidad','#B86B6B');return;}
  var cantidad=parseFloat(inp.value);
  if(isNaN(cantidad)||cantidad<0){toast('Cantidad inválida','#B86B6B');return;}
  var usuario=CU?CU.name:'—';
  var d=document.getElementById('hedit-'+fila);
  if(d) d.innerHTML='<div style="font-size:0.65rem;color:var(--gray)">⏳</div>';
  fetch(APPS_SCRIPT_URL+'?action=editarEntrada&fila='+encodeURIComponent(fila)+'&cantidad='+encodeURIComponent(cantidad)+'&usuario='+encodeURIComponent(usuario))
    .then(function(r){return r.text();})
    .then(function(t){
      var res; try{res=JSON.parse(t);}catch(e){res={error:t.slice(0,80)};}
      if(res.ok){
        var eLabel=cantidad===0?'❌ No llegó':cantidad>=pedida?'✅ Completo':'⚠️ Parcial '+cantidad+'/'+pedida;
        var eColor=cantidad===0?'var(--red)':cantidad>=pedida?'var(--green)':'var(--gold)';
        var st=document.getElementById('hst-'+fila);
        if(st) st.innerHTML='<span style="font-size:0.72rem;font-weight:700;color:'+eColor+'">'+eLabel+'</span>'
          +'<div style="font-size:0.55rem;color:var(--gray)">por '+usuario+' · '+(res.ts||'')+'</div>';
        cancelarEdicionEntrega(fila,pedida);
        // Actualizar memoria para regenerar actas sin recargar
        if(window._gruposHistOC){
          Object.keys(window._gruposHistOC).forEach(function(k){
            window._gruposHistOC[k].items.forEach(function(it){
              if(it.fila===fila){it.recibida=cantidad;it.usuario=usuario;it.timestamp=res.ts||'';it.estado=res.estado||'';}
            });
          });
        }
        toast('✏️ Entrega actualizada','var(--green)');
      } else {
        cancelarEdicionEntrega(fila,pedida);
        toast('❌ '+(res.error||'Error'),'#B86B6B');
      }
    })
    .catch(function(){cancelarEdicionEntrega(fila,pedida);toast('❌ Error de conexión','#B86B6B');});
}

function registrarEntrada(fila,pedida,tipo){
  var cantidad=tipo==='completo'?pedida:tipo==='nollego'?0:(parseFloat((document.getElementById('pi-'+fila)||{}).value)||0);
  if(tipo==='parcial'&&!(document.getElementById('pi-'+fila)||{}).value){toast('Escribe la cantidad','#B86B6B');return;}
  var d=document.getElementById('ebtn-'+fila);
  if(d) d.innerHTML='<div style="font-size:0.7rem;color:var(--gray)">⏳ Guardando...</div>';
  var usuario=CU?CU.name:'—';
  var tsRecep=new Date().toLocaleString('es',{timeZone:'America/Guayaquil',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  fetch(APPS_SCRIPT_URL+'?action=registrarEntrada&fila='+encodeURIComponent(fila)+'&cantidad='+encodeURIComponent(cantidad)+'&usuario='+encodeURIComponent(usuario))
    .then(function(r){return r.text();})
    .then(function(t){
      var res; try{res=JSON.parse(t);}catch(e){res={error:t.slice(0,80)};}
      if(res.ok){
        var el=cantidad===0?'❌ No llegó':cantidad>=pedida?'✅ Completo':'⚠️ Parcial '+cantidad+'/'+pedida;
        var ec=cantidad===0?'var(--red)':cantidad>=pedida?'var(--green)':'var(--gold)';
        if(d) d.innerHTML='<span style="font-size:0.72rem;font-weight:700;color:'+ec+'">'+el+'</span>';
        toast('✅ Registrado','var(--green)');
        // Update in-memory data for PDF (no page reload)
        if(window._gruposEntrada){
          Object.keys(window._gruposEntrada).forEach(function(gname){
            window._gruposEntrada[gname].items.forEach(function(it){
              if(it.fila===fila){
                it.recibida=cantidad;
                it.usuario=usuario;
                it.timestamp=tsRecep;
              }
            });
          });
        }
        // Update pending counter in group header
        _actualizarContadorGrupo(fila);
        // NO automatic page reload — user closes with "Cerrar pedido"
      } else {
        cancelarParcial(fila,pedida);
        toast('❌ '+(res.error||'Error'),'#B86B6B');
      }
    })
    .catch(function(){cancelarParcial(fila,pedida);toast('❌ Error de conexión','#B86B6B');});
}

function _actualizarContadorGrupo(filaActualizada){
  if(!window._gruposEntrada) return;
  Object.keys(window._gruposEntrada).forEach(function(gname){
    var g=window._gruposEntrada[gname];
    var tieneEsta=g.items.some(function(it){return it.fila===filaActualizada;});
    if(!tieneEsta) return;
    var pendientes=g.items.filter(function(it){return it.recibida===''||it.recibida===null||it.recibida===undefined;}).length;
    // Find the header span for this group
    Object.keys(window._gruposEntrada).forEach(function(gn,gi){
      if(gn!==gname) return;
      var gid='grp-'+gi;
      var arrow=document.getElementById('arrow-'+gid);
      if(arrow){
        var span=arrow.parentElement?arrow.parentElement.querySelector('span:first-child'):null;
        if(span){
          span.textContent=pendientes===0?'✅ Listo':pendientes+' pendientes';
          span.style.color=pendientes===0?'#A8E6A3':'#FFD580';
        }
      }
    });
  });
}

    .then(function(r){return r.json();})

function _buildFacCard(t){
  var hora=t.timestamp?new Date(t.timestamp).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Guayaquil'}):'';

  var cobLabel=t.cob?('✅ '+(t.comp||'Cobrado')):'Sin cobro';
  var facDone=t.fac&&t.numFac, cobDone=t.cob;
  return '<div id="fac-card-'+t.fila+'" style="background:white;border:1.5px solid var(--cream-d);border-radius:13px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)">'
    // Header
    +'<div style="background:var(--navy);padding:9px 13px;display:flex;justify-content:space-between;align-items:center">'
    +'<div><div style="font-size:0.78rem;font-weight:800;color:white">'+t.nombre+' '+t.apellido+'</div>'
    +'<div style="font-size:0.62rem;color:rgba(255,255,255,0.7)">'+t.cedula+' · '+hora+(t.facial?' · '+t.facial.replace(/SUNSU-\d+\s*/,''):'')+'</div></div>'
    +'<div style="font-size:0.72rem;font-weight:700;color:var(--gold)">'+(t.estimado>0?'$'+t.estimado.toFixed(2):'')+'</div></div>'
    // Body
    +'<div style="padding:10px 13px">'
    // Factura row
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
    +'<div style="flex:1;font-size:0.75rem;color:'+(facDone?'var(--green)':'var(--gray)')+'">🧾 '+facLabel+'</div>'
    +(!facDone?'<button data-fila="'+t.fila+'" data-est="'+t.estimado+'" data-sinfac="false" onclick="abrirModalUnificadoBtn(this,false)" style="padding:5px 12px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:0.72rem;font-weight:700;cursor:pointer">Facturar</button>':'')
    +(!facDone?'<button data-fila="'+t.fila+'" data-est="'+t.estimado+'" data-sinfac="true" onclick="abrirModalUnificadoBtn(this,false)" style="padding:5px 12px;background:var(--gray-l);color:var(--gray);border:none;border-radius:8px;font-size:0.72rem;font-weight:600;cursor:pointer">Sin factura</button>':'')
    +'</div>'
    // Cobro row
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<div style="flex:1;font-size:0.75rem;color:'+(cobDone?'var(--green)':'var(--gray)')+'">💳 '+cobLabel+'</div>'
    +(!cobDone&&facDone?'<button data-fila="'+t.fila+'" data-est="'+t.estimado+'" data-sinfac="'+String(t.numFac==='SIN FACTURA')+'" onclick="abrirModalUnificadoBtn(this,true)" style="padding:5px 12px;background:var(--green);color:white;border:none;border-radius:8px;font-size:0.72rem;font-weight:700;cursor:pointer">Cobro</button>':'')
    +'</div></div></div>';
}

function abrirModalUnificado(fila,estimado,sinFac,soloCobro){

function toggleCobro(btn){
  var fila=btn.getAttribute('data-fila');
  var tipo=btn.getAttribute('data-tipo');
  var det=document.getElementById('cobdet-'+fila+'-'+tipo);
  var active=!(_cobroSelects[fila]&&_cobroSelects[fila][tipo]);
  if(!_cobroSelects[fila])_cobroSelects[fila]={};
  _cobroSelects[fila][tipo]=active;
  btn.style.background=active?'var(--navy)':'var(--cream)';btn.style.color=active?'white':'var(--navy)';btn.style.borderColor=active?'var(--navy)':'var(--cream-d)';
  if(det){det.style.display=active?'block':'none';if(active)setTimeout(function(){det.focus();},50);}
}

function guardarUnificado(fila,sinFac,soloCobro){
  var seleccionados=Object.keys(_cobroSelects[fila]||{}).filter(function(t){return _cobroSelects[fila][t];});
  if(!seleccionados.length){var e=document.getElementById('cob-error-'+fila);if(e)e.style.display='block';return;}
  var numFac=sinFac?'SIN FACTURA':'';
  if(!sinFac&&!soloCobro){numFac=(document.getElementById('inp-fac-'+fila)||{}).value||'';if(!numFac.trim()){toast('Escribe el número de factura','#B86B6B');return;}}
  var compStr=seleccionados.map(function(tipo){var det=document.getElementById('cobdet-'+fila+'-'+tipo);var val=det?det.value.trim():'';return val?tipo+':'+val:tipo;}).join(', ');
  cerrarModal('modal-uni-'+fila);
  fetch(APPS_SCRIPT_URL+'?action=registrarFacturaCobro&fila='+encodeURIComponent(fila)+(numFac?'&numFac='+encodeURIComponent(numFac):'')+'&comp='+encodeURIComponent(compStr)+'&soloCobro='+(soloCobro?'1':'0'))
    .then(function(r){return r.text();})
    .then(function(txt){
      var d; try{d=JSON.parse(txt);}catch(ex){d={error:'Respuesta inválida: '+txt.slice(0,80)};}
      if(d.ok){toast('✅ Registrado','var(--green)');_refreshOrRemoveCard(fila);}
      else toast('❌ '+(d.error||'Error'),'#B86B6B');
    })
    .catch(function(err){toast('❌ Error: '+err.message,'#B86B6B');});
}

    +'<span style="font-size:0.65rem;background:var(--cream);color:var(--gray);padding:2px 8px;border-radius:6px">📅 Comprada: '+fecha+'</span>'
    +'</div>'
    +(usado?
      '<div style="background:var(--gray-l);border-radius:9px;padding:8px 10px;font-size:0.72rem;color:var(--gray)">'
      +(g.fechaUso?'<div>📅 Usada: <strong>'+g.fechaUso+'</strong></div>':'')
      +(g.usadoPor?'<div>👤 Por: <strong>'+g.usadoPor+'</strong></div>':'')
      +(g.notas?'<div>📝 '+g.notas+'</div>':'')
      +'</div>'
      :
      ((g.usadoPor||g.notas)?
        '<div style="background:var(--blue-ll);border-radius:9px;padding:8px 10px;font-size:0.72rem;color:var(--gray);margin-bottom:8px">'
        +(g.usadoPor?'<div>👤 '+g.usadoPor+'</div>':'')
        +(g.notas?'<div style="margin-top:'+(g.usadoPor?'4':'0')+'px">📝 '+g.notas+'</div>':'')

    +interactivo
    +'</div></div>';
}

function togglePaqUso(chk, fila, idx, total){

function guardarPaqUso(fila, idx, total){
  var slotId='paq-uso-'+fila+'-'+idx;
  var chk=document.getElementById('chk-'+slotId);
  var notaEl=document.getElementById('nota-'+slotId);

  // Auto-note: fecha · facial · usuario
  var hoy=new Date();
  var pad=function(n){return String(n).padStart(2,'0');};
  var fechaStr=pad(hoy.getDate())+'/'+pad(hoy.getMonth()+1)+'/'+String(hoy.getFullYear()).slice(2);
  var usuario=CU?CU.name:'—';
  var notaFinal=fechaStr+' '+facialNota+' · '+usuario;
  if(btn){btn.disabled=true;btn.textContent='⏳';}
  fetch(APPS_SCRIPT_URL+'?action=marcarUsoManual'
    +'&fila='+encodeURIComponent(fila)
    +'&idx='+encodeURIComponent(idx)
    +'&nota='+encodeURIComponent(notaFinal)
    +'&total='+encodeURIComponent(total))

        var row=document.getElementById('row-'+slotId);
        if(row) row.innerHTML='<span style="font-size:0.68rem;font-weight:700;color:var(--green);min-width:28px">'+(idx+1)+'/'+total+'</span>'
          +'<span style="font-size:0.72rem;color:var(--green)">✅</span>'
          +'<span style="font-size:0.7rem;color:var(--text);flex:1">'+notaFinal+'</span>';
      } else {
        if(btn){btn.disabled=false;btn.textContent='✓';}
        toast('❌ '+(d.error||'Error'),'#B86B6B');
      }
    })
    .catch(function(){
      if(btn){btn.disabled=false;btn.textContent='✓';}
      toast('❌ Error de conexión','#B86B6B');
    });
}

function renderBuscarPaquetes(c){
  c.innerHTML=
    '<div style="font-size:0.88rem;font-weight:800;color:var(--navy);margin-bottom:12px">📦 Buscar Paquetes</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:14px">'
    +'<input id="bpq-inp" type="text" placeholder="Nombre, apellido o cédula..." style="flex:1;padding:10px 13px;border:1.5px solid var(--cream-d);border-radius:11px;font-size:0.86rem;font-family:inherit;outline:none">'
    +'<button onclick="ejecutarBuscarPaquetes()" style="padding:10px 16px;background:var(--navy);color:white;border:none;border-radius:11px;font-size:0.82rem;font-weight:700;cursor:pointer">🔍</button>'
    +'</div>'
    +'<div id="bpq-results"></div>';
  var inp=document.getElementById('bpq-inp');
  if(inp){
    if(window._paqPrefill){inp.value=window._paqPrefill;window._paqPrefill='';setTimeout(ejecutarBuscarPaquetes,50);}
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')ejecutarBuscarPaquetes();});
    inp.addEventListener('input',function(){
      clearTimeout(window._bpqTimer);
      window._bpqTimer=setTimeout(function(){
        if(inp.value.trim().length>=2) ejecutarBuscarPaquetes();
      },400);
    });
  }
}

function ejecutarBuscarPaquetes(){
  var q=(document.getElementById('bpq-inp')||{}).value||'';
  if(!q.trim()){return;}
  var res=document.getElementById('bpq-results');
  if(!res) return;
  res.innerHTML='<div class="loading"><div class="spinner"></div>Buscando...</div>';
  fetch(APPS_SCRIPT_URL+'?action=buscarPaquetes&q='+encodeURIComponent(q.trim()))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){res.innerHTML='<div class="card" style="color:var(--red)">❌ '+d.error+'</div>';return;}
      var arr=d.resultados||[];
      if(!arr.length){res.innerHTML='<div class="card" style="text-align:center;color:var(--gray);padding:20px">Sin resultados para "'+q+'"</div>';return;}
      res.innerHTML=arr.map(function(p){return _buildPaqueteCard(p);}).join('');
    })
    .catch(function(){res.innerHTML='<div class="card" style="color:var(--red)">❌ Error de conexión</div>';});
}

function _buildPaqueteCard(p){
  var completo = p.completo;
  var borderCol = completo ? 'var(--red)' : 'var(--cream-d)';
  var headerBg  = completo ? 'var(--red)' : 'var(--navy)';
  var fecha = (p.dia||'?')+'/'+(p.mes||'?')+'/'+(p.ano||'?');
  var usados = p.usados||0;
  var total  = p.totalSes||3;
  var restantes = total - usados;

  // Progress bar
  var pct = Math.round((usados/total)*100);
  var barCol = completo ? 'var(--red)' : usados===0 ? 'var(--blue)' : usados===total ? 'var(--red)' : 'var(--green)';

  // Usos detail — all users can mark unused sessions
  var usosHtml = (p.usos||[]).map(function(u, i){
    var label = (i+1)+'/'+total;
    var isGC = u.fecha && u.fecha.indexOf('Gift Card')>=0;
    if(u.usado){
      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--gray-ll)">'
        +'<span style="font-size:0.68rem;font-weight:700;color:var(--green);min-width:28px">'+label+'</span>'
        +'<span style="font-size:0.72rem;color:var(--green)">✅</span>'
        +'<span style="font-size:0.7rem;color:'+(isGC?'var(--lavender)':'var(--text)')+';flex:1">'+(u.fecha||'—')+(isGC?' 🎁':'')+'</span>'
        +'</div>';
    } else {
      var slotId='paq-uso-'+p.fila+'-'+i;
      // Facial options for quick select (first 4 letters match)
      var facOptsHtml='<option value="">💆 Facial hecho...</option>'
        +FACIALES.map(function(f){
          return '<option value="'+f.n+'">'+f.n+'</option>';
        }).join('');
      return '<div id="row-'+slotId+'" style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--gray-ll)">'
        +'<span style="font-size:0.68rem;font-weight:700;color:var(--gray);min-width:28px">'+label+'</span>'
        +'<input type="checkbox" id="chk-'+slotId+'" onchange="togglePaqUso(this,'+p.fila+','+i+','+total+')" style="width:16px;height:16px;flex-shrink:0;cursor:pointer">'
        +'<div id="inputs-'+slotId+'" style="display:none;flex:1;display:none;gap:5px;align-items:center">'
        +'<input list="faclist-'+slotId+'" id="nota-'+slotId+'" placeholder="Facial..." style="flex:1;padding:4px 8px;border:1.5px solid var(--cream-d);border-radius:7px;font-size:0.72rem;font-family:inherit;outline:none;min-width:0">'
        +'<datalist id="faclist-'+slotId+'">'+facOptsHtml+'</datalist>'
        +'<button id="btn-'+slotId+'" onclick="guardarPaqUso('+p.fila+','+i+','+total+')" style="padding:4px 10px;background:var(--green);color:white;border:none;border-radius:7px;font-size:0.65rem;font-weight:700;cursor:pointer;flex-shrink:0">✓</button>'
        +'</div>'
        +'</div>';
    }
  }).join('');

  return '<div style="background:white;border:1.5px solid '+borderCol+';border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)">'
    // Header
    +'<div style="background:'+headerBg+';padding:10px 14px;display:flex;justify-content:space-between;align-items:center">'
    +'<div><div style="font-size:0.78rem;font-weight:800;color:white">'+p.nombre+' '+p.apellido+'</div>'
    +'<div style="font-size:0.62rem;color:rgba(255,255,255,0.75)">'+p.cedula+' · '+fecha+'</div></div>'
    +'<div style="text-align:right"><div style="font-size:0.65rem;font-family:monospace;color:rgba(255,255,255,0.9);background:rgba(0,0,0,0.2);padding:2px 7px;border-radius:6px">'+p.sku+'</div>'
    +(completo?'<div style="font-size:0.6rem;color:#FFB3B3;margin-top:3px;font-weight:700">🔴 PAQUETE TERMINADO</div>':'')
    +'</div></div>'
    // Body
    +'<div style="padding:12px 14px">'
    // Info
    +'<div style="font-size:0.78rem;font-weight:700;color:var(--navy);margin-bottom:6px">'+p.paquete+'</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'
    +'<span style="font-size:0.65rem;background:var(--blue-l);color:var(--navy);padding:2px 8px;border-radius:6px;font-weight:600">👤 '+p.vendidoPor+'</span>'
    +(p.factura?'<span style="font-size:0.65rem;background:var(--cream);color:var(--gray);padding:2px 8px;border-radius:6px">🧾 '+p.factura+'</span>':'')
    +(p.saldo?'<span style="font-size:0.65rem;background:var(--gold-l);color:var(--gold);padding:2px 8px;border-radius:6px;font-weight:600">💰 Saldo: '+p.saldo+'</span>':'')
    +'</div>'
    // Progress bar
    +'<div style="margin-bottom:8px">'
    +'<div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--gray);margin-bottom:3px">'
    +'<span>Sesiones usadas: <strong>'+usados+'/'+total+'</strong></span>'
    +'<span style="color:'+(completo?'var(--red)':restantes>0?'var(--green)':'var(--gray)')+'">'+( completo?'Terminado':restantes+' restante'+(restantes!==1?'s':''))+'</span>'
    +'</div>'
    +'<div style="background:var(--gray-l);border-radius:99px;height:6px">'
    +'<div style="background:'+barCol+';width:'+pct+'%;height:6px;border-radius:99px;transition:width 0.3s"></div>'
    +'</div></div>'
    // Usos detail
    +usosHtml
    +(p.notas?'<div style="margin-top:8px;font-size:0.68rem;color:var(--gray);background:var(--cream);padding:6px 9px;border-radius:8px">📝 '+p.notas+'</div>':'')
    +'</div></div>';
}

function guardarMulta(tkRow){
  var isTicket=tkRow!=null;
  var prefix=isTicket?'mtk-':'mul-';
  var get=function(id){var el=document.getElementById(prefix+id);return el?el.value.trim():'';};
  var btn=document.getElementById(prefix+'btn');
  var msg=document.getElementById(prefix+'msg');
  var cosm=get('cosm'), tipo=get('tipo'), montoStr=get('monto'), motivo=get('motivo');
  var monto=parseFloat(montoStr)||0;
  if(!cosm||!monto||!motivo){
    msg.style.display='block'; msg.style.background='var(--red-l)'; msg.style.color='var(--red)';
    msg.textContent='❌ Completa cosmetóloga, monto y motivo';
    return;
  }
  btn.disabled=true; btn.textContent='⏳ Guardando...';
  fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({
      accion:'registrarMulta',
      cosmetologa: cosm,
      tipo: tipo,
      monto: monto,
      motivo: motivo,
      tkRow: tkRow||'',
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    btn.disabled=false; btn.textContent=isTicket?'⚠️ Aplicar multa':'⚠️ Registrar';
    if(d.ok){
      msg.style.display='block'; msg.style.background='var(--green-l)'; msg.style.color='var(--green)';
      msg.textContent='✅ Registrado correctamente';
      setTimeout(function(){
        if(isTicket){var ov=document.getElementById('multa-overlay');if(ov)ov.remove();}
        else{renderMultas(document.getElementById('content'));}
      },1300);
    } else {
      msg.style.display='block'; msg.style.background='var(--red-l)'; msg.style.color='var(--red)';
      msg.textContent='❌ '+(d.error||'Error al guardar');
    }
  })
  .catch(function(){
    btn.disabled=false; btn.textContent=isTicket?'⚠️ Aplicar multa':'⚠️ Registrar';
    msg.style.display='block'; msg.style.background='var(--red-l)'; msg.style.color='var(--red)';
    msg.textContent='❌ Error de conexión';
  });
}
