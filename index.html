<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Minecore App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --mc-yellow:#E8FF00;--mc-dark:#2D3142;--mc-dark2:#3d4258;
  --brand:#1D9E75;--brand-dark:#085041;--brand-light:#E1F5EE;
  --gold:#BA7517;--gold-light:#FAEEDA;
  --bg:#F5F5F0;--surface:#fff;--surface2:#F1EFE8;
  --text:#1a1a18;--text2:#5F5E5A;--text3:#888780;
  --border:#D3D1C7;--border2:#B4B2A9;
  --success-bg:#EAF3DE;--success-text:#3B6D11;
  --warn-bg:#FAEEDA;--warn-text:#854F0B;
  --danger-bg:#FCEBEB;--danger-text:#A32D2D;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1d26;--surface:#2D3142;--surface2:#3d4258;
  --text:#F1EFE8;--text2:#B4B2A9;--text3:#888780;
  --border:#3d4258;--border2:#4d5270;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--mc-dark);color:var(--text);min-height:100vh;font-size:15px}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;overflow-y:auto;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── USER SELECT ── */
#user-screen{background:var(--mc-dark)}
.user-header{padding:48px 24px 16px;text-align:center}
.user-header-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.user-header-logo img{width:36px;height:36px;object-fit:contain}
.user-header-logo-text{color:var(--mc-yellow);font-size:15px;font-weight:900;letter-spacing:3px}
.user-header-title{font-size:24px;font-weight:700;color:#fff}
.user-header-sub{font-size:14px;color:rgba(255,255,255,0.4);margin-top:4px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px 40px;max-width:420px;margin:0 auto;width:100%}
.user-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;position:relative}
.user-card:active{transform:scale(0.95);background:rgba(232,255,0,0.12);border-color:var(--mc-yellow)}
.admin-dot{width:8px;height:8px;border-radius:50%;background:var(--mc-yellow);position:absolute;top:12px;right:12px}
.user-avatar{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;border:2px solid rgba(255,255,255,0.15)}
.user-full-name{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);text-align:center}

/* ── PIN ── */
#pin-screen{background:var(--mc-dark);align-items:center;justify-content:center;padding:24px}
.pin-back{position:absolute;top:20px;left:16px;background:none;border:none;font-size:28px;color:rgba(255,255,255,0.4);cursor:pointer;padding:8px}
.pin-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px}
.pin-avatar{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;border:2px solid rgba(255,255,255,0.2)}
.pin-name{font-size:19px;font-weight:700;color:#fff}
.pin-hint{font-size:13px;color:rgba(255,255,255,0.4)}
.pin-dots{display:flex;gap:18px;margin-bottom:36px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);transition:all 0.12s}
.pin-dot.filled{background:var(--mc-yellow);border-color:var(--mc-yellow)}
.pin-dot.error{background:#E24B4A;border-color:#E24B4A}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;width:100%}
.pin-key{height:66px;border-radius:var(--radius-lg);background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);font-size:24px;font-weight:500;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:rgba(232,255,0,0.15);border-color:var(--mc-yellow);transform:scale(0.93)}
.pin-key.empty{background:transparent;border:none;cursor:default}
.pin-error-msg{color:#E24B4A;font-size:13px;margin-top:14px;min-height:18px;text-align:center}

/* ── HOME ── */
#home-screen{background:var(--mc-dark)}
.home-topbar{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid rgba(255,255,255,0.08)}
.home-brand{display:flex;align-items:center;gap:8px}
.home-brand img{width:26px;height:26px;object-fit:contain}
.home-brand-text{color:var(--mc-yellow);font-size:14px;font-weight:900;letter-spacing:2px}
.home-user-row{display:flex;align-items:center;gap:8px}
.home-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:1.5px solid rgba(255,255,255,0.2)}
.home-name{font-size:12px;color:rgba(255,255,255,0.6);font-weight:600}
.btn-logout{background:none;border:none;color:rgba(255,255,255,0.35);font-size:12px;padding:6px 8px;cursor:pointer}
.home-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.home-greeting-name{font-size:24px;font-weight:800;color:#fff;text-align:center}
.home-greeting-sub{font-size:14px;color:rgba(255,255,255,0.4);margin-top:3px;text-align:center}
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:380px;margin-top:8px}
.module-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:24px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer}
.module-btn:active{transform:scale(0.95)}
.module-btn.rutas{border-top:3px solid var(--brand)}
.module-btn.caja{border-top:3px solid var(--mc-yellow)}
.module-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center}
.module-icon.rutas{background:var(--brand-light)}
.module-icon.caja{background:rgba(232,255,0,0.12)}
.module-icon svg{width:28px;height:28px;fill:none;stroke-width:1.8;stroke-linecap:round}
.module-icon.rutas svg{stroke:var(--brand-dark)}
.module-icon.caja svg{stroke:var(--mc-yellow)}
.module-label{font-size:15px;font-weight:700;color:#fff}
.module-sub{font-size:11px;color:rgba(255,255,255,0.4);text-align:center}

/* ── APP ── */
#app-screen{background:var(--bg)}
.topbar{background:var(--mc-dark);border-bottom:0.5px solid rgba(255,255,255,0.08);padding:11px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.topbar-back{background:none;border:none;font-size:24px;color:rgba(255,255,255,0.5);cursor:pointer;padding:2px 8px}
.mod-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mod-dot.rutas{background:var(--brand)}
.mod-dot.caja{background:var(--mc-yellow)}
.topbar-title{font-size:15px;font-weight:700;color:#fff;flex:1}
.topbar-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.content{flex:1;padding:16px;max-width:500px;margin:0 auto;width:100%;padding-bottom:90px}
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--mc-dark);border-top:0.5px solid rgba(255,255,255,0.08);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,0.3);gap:3px}
.nav-btn.active{color:var(--brand)}
.nav-btn.active.yn{color:var(--mc-yellow)}
.nav-btn svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.nav-btn span{font-size:10px;font-weight:600}

/* ── COMPONENTS ── */
.card{background:var(--surface);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;border:0.5px solid var(--border)}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.pending{background:var(--warn-bg);color:var(--warn-text)}
.badge.approved,.badge.aprobado{background:var(--success-bg);color:var(--success-text)}
.badge.rejected,.badge.rechazado{background:var(--danger-bg);color:var(--danger-text)}
.route-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.route-dest{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.route-meta{font-size:12px;color:var(--text2);margin-bottom:4px}
.route-valor{font-size:16px;font-weight:700;color:var(--text)}
.route-tipo{font-size:11px;color:var(--text3)}
.action-row{display:flex;gap:8px;margin-top:10px}
.btn-approve{flex:1;padding:10px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer}
.btn-reject{flex:1;padding:10px;background:var(--danger-bg);color:var(--danger-text);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer}
.reject-input{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);margin-top:8px;display:none}
.field-group{margin-bottom:13px}
.field-label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em}
.field-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--bg);color:var(--text);outline:none}
.field-input:focus{border-color:var(--brand)}
.field-select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none}
.btn-submit{width:100%;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-submit:disabled{opacity:0.5}
.btn-submit.yn{background:var(--mc-yellow);color:var(--mc-dark)}
.map-container{border-radius:var(--radius);overflow:hidden;margin-bottom:12px;border:1px solid var(--border)}
#map{width:100%;height:220px;background:var(--surface2)}
.km-preview{background:var(--mc-dark);border-radius:var(--radius);padding:12px 14px;display:none;margin-bottom:12px;border:1px solid rgba(232,255,0,0.3)}
.km-preview-row{display:flex;align-items:center;justify-content:space-between}
.km-preview-label{font-size:13px;color:rgba(255,255,255,0.6)}
.km-preview-val{font-size:22px;font-weight:900;color:var(--mc-yellow)}
.km-preview-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px}
.parada-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.parada-num{width:22px;height:22px;border-radius:50%;background:var(--mc-yellow);color:var(--mc-dark);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.parada-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);outline:none}
.btn-add-parada{width:100%;padding:10px;background:rgba(232,255,0,0.08);border:1.5px dashed rgba(232,255,0,0.3);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;color:#B8CC00;margin-bottom:12px}
.btn-loc{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border2);border-radius:var(--radius);padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;width:100%;margin-bottom:8px}
.fav-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text);cursor:pointer;margin:0 6px 6px 0}
.fav-chip:active{background:var(--brand-light);border-color:var(--brand)}
.favs-row{display:flex;flex-wrap:wrap;margin-bottom:8px}
.photo-upload{border:2px dashed var(--border2);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;margin-bottom:13px}
.photo-upload input{display:none}
.photo-preview{width:100%;border-radius:var(--radius);margin-top:8px;display:none;max-height:160px;object-fit:cover}
.photo-status{font-size:12px;margin-top:6px;display:none}
.caja-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.caja-desc{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.caja-monto{font-size:18px;font-weight:700;margin-bottom:4px}
.caja-meta{font-size:12px;color:var(--text2)}
.caja-foto-link{font-size:12px;color:var(--brand);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:4px}
.caja-dash{background:var(--mc-dark);border-radius:18px;padding:20px;margin-bottom:14px;border:1px solid rgba(232,255,0,0.2)}
.caja-dash-label{font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.caja-dash-amount{font-size:36px;font-weight:900;color:var(--mc-yellow);letter-spacing:-1px}
.caja-dash-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.cds{background:rgba(255,255,255,0.06);border-radius:10px;padding:10px 8px;text-align:center}
.cds-val{font-size:16px;font-weight:800;color:#fff}
.cds-val.pos{color:#7DD87A}.cds-val.neg{color:#E24B4A}.cds-val.warn{color:var(--mc-yellow)}
.cds-lbl{font-size:10px;color:rgba(255,255,255,0.4);margin-top:3px;text-transform:uppercase}
.balance-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.bal-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bal-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.bal-name{font-size:14px;font-weight:600;color:var(--text)}
.bal-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:6px 0 4px}
.bal-fill{height:100%;background:var(--brand);border-radius:3px}
.bal-fill.over{background:#E24B4A}
.bal-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.bal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.bal-stat{text-align:center;background:var(--surface2);border-radius:var(--radius);padding:8px 4px}
.bal-stat-val{font-size:15px;font-weight:700;color:var(--text)}
.bal-stat-val.pos{color:var(--success-text)}.bal-stat-val.neg{color:var(--danger-text)}
.bal-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.user-li{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.user-li:last-child{border-bottom:none}
.user-li-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.user-li-info{flex:1}
.user-li-name{font-size:14px;font-weight:600;color:var(--text)}
.user-li-role{font-size:12px;color:var(--text2);margin-top:1px}
.btn-icon{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 6px;border-radius:6px}
.btn-add-user{width:100%;padding:12px;background:var(--brand-light);color:var(--brand-dark);border:1.5px dashed var(--brand);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.tab-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tab-row::-webkit-scrollbar{display:none}
.tab{padding:6px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface);white-space:nowrap;font-weight:500}
.tab.active{background:var(--brand-light);color:var(--brand-dark);border-color:var(--brand);font-weight:700}
.tab.active.yn{background:rgba(232,255,0,0.12);color:#B8CC00;border-color:var(--mc-yellow)}
.corte-total{background:var(--mc-dark);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;text-align:center;border:1px solid rgba(232,255,0,0.2)}
.corte-label{font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-bottom:4px}
.corte-amount{font-size:36px;font-weight:900;color:var(--mc-yellow);letter-spacing:-1px}
.corte-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px}
.corte-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.corte-stat{background:var(--surface2);border-radius:var(--radius);padding:10px 6px;text-align:center}
.corte-stat-val{font-size:17px;font-weight:700;color:var(--text)}
.corte-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.btn-export{width:100%;padding:13px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;gap:8px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:0.5px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-label{font-size:14px;color:var(--text);font-weight:600}
.cfg-sub{font-size:12px;color:var(--text2);margin-top:2px}
.cfg-val{font-size:15px;font-weight:700;color:var(--brand)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--mc-dark);color:#fff;border:1px solid rgba(232,255,0,0.3);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.25s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:40px;color:var(--text2)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--mc-yellow);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.pac-container{z-index:9999!important}
.filter-btn{padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface);white-space:nowrap;font-weight:500;transition:all 0.1s}
.filter-btn.active{background:var(--brand-light);color:var(--brand-dark);border-color:var(--brand);font-weight:700}
.filter-btn:active{transform:scale(0.96)}
.cnt-btn{padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:var(--surface);white-space:nowrap;font-weight:600;transition:all 0.12s}
.cnt-btn.active{background:var(--mc-dark);color:#fff;border-color:var(--mc-dark);font-weight:700}
.cnt-btn:active{transform:scale(0.95)}
</style>
</head>
<body>

<!-- USER SELECT -->
<div id="user-screen" class="screen active">
  <div class="user-header">
    <div class="user-header-logo">
      <img src="isotipo.png" alt="M" onerror="this.style.display='none'">
      <span class="user-header-logo-text">MINECORE</span>
    </div>
    <div class="user-header-title">¿Quién eres?</div>
    <div class="user-header-sub">Toca tu perfil para ingresar</div>
  </div>
  <div class="user-grid" id="user-grid">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- PIN -->
<div id="pin-screen" class="screen">
  <button class="pin-back" onclick="goBack()">‹</button>
  <div class="pin-avatar-wrap">
    <div class="pin-avatar" id="pin-avatar"></div>
    <div class="pin-name" id="pin-name"></div>
    <div class="pin-hint">Ingresa tu PIN</div>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-keypad">
    <button class="pin-key" onclick="pk('1')">1</button>
    <button class="pin-key" onclick="pk('2')">2</button>

// ── BOOT ── (runs immediately, no waiting)
(function boot(){
  // Render users right away
  renderGrid();
  // Try to restore session
  try{
    const s = sessionStorage.getItem('mcSession');
    if(s){ session=JSON.parse(s); if(session&&session.usuario){ goHome(); return; } }
  }catch(e){ sessionStorage.removeItem('mcSession'); }
  // Show user screen (already active by default in HTML)
  // Try to load real users in background
  api({action:'getUsuarios'}).then(r=>{
    if(r&&r.ok&&r.usuarios&&r.usuarios.length){ allUsers=r.usuarios; renderGrid(); }
  }).catch(()=>{});

  api({action:'getConfig'}).then(r=>{ if(r&&r.ok) config=r.config; }).catch(()=>{});
})();

function renderGrid(){
  // If localStorage has bad data, reset to defaults
  const active = allUsers.filter(u=>u.activo==='SI');

    allUsers=DEFAULT_USERS;

  }
  const toShow = allUsers.filter(u=>u.activo==='SI');
  document.getElementById('user-grid').innerHTML = toShow.map(u=>{
    const c = col(u.usuario);
    return `<div class="user-card" onclick="selectUser('${u.usuario}')">

function selectUser(usuario){

  show('pin-screen');
}

function pk(d){
  if(pinBuf.length>=4) return;
  pinBuf+=d; updateDots();
  if(pinBuf.length===4) setTimeout(submitPin,120);
}
function pdel(){ pinBuf=pinBuf.slice(0,-1); updateDots(); document.getElementById('pin-error').textContent=''; }
function updateDots(){
  document.querySelectorAll('.pin-dot').forEach((d,i)=>{
    d.classList.remove('filled','error');
    if(i<pinBuf.length) d.classList.add('filled');
  });
}

async function submitPin(){
  // Check PIN locally first (works offline/file://) - Sunsu pattern
  const localUser = allUsers.find(u=>u.usuario===selUser.usuario&&u.activo==='SI');
  // Pad PIN to 4 digits to handle Sheets stripping leading zeros (0000 → 0)
  const localPin = String(localUser&&localUser.pin||'').padStart(4,'0');
  if(localUser && localPin===String(pinBuf)){
    // Local login success
    session={ok:true, usuario:localUser.usuario, nombre:localUser.nombre, rol:(localUser.rol||'chofer').toLowerCase()};
    sessionStorage.setItem('mcSession',JSON.stringify(session));
    goHome();
    // Sync with server in background
    api({action:'getUsuarios'}).then(r=>{
      if(r&&r.ok&&r.usuarios&&r.usuarios.length){
        saveLocalUsers(r.usuarios);
        allUsers=r.usuarios;
      }
    }).catch(()=>{});
    return;
  }
  // No local PIN - try server
  try{
    const r = await api({action:'login', usuario:selUser.usuario, pin:pinBuf});
    if(r.ok){
      r.rol = (r.rol||'chofer').toLowerCase();
      session=r;
      sessionStorage.setItem('mcSession',JSON.stringify(session));
      // Save PIN locally for next offline use
      const idx=allUsers.findIndex(u=>u.usuario===selUser.usuario);
      if(idx>=0){ allUsers[idx].pin=pinBuf; saveLocalUsers(allUsers); }
      goHome();
    } else {
      document.querySelectorAll('.pin-dot').forEach(d=>{d.classList.remove('filled');d.classList.add('error');});
      document.getElementById('pin-error').textContent='PIN incorrecto';
      setTimeout(()=>{ pinBuf=''; updateDots(); document.getElementById('pin-error').textContent=''; },900);
    }
  }catch(e){
    document.getElementById('pin-error').textContent='PIN incorrecto';
    setTimeout(()=>{ pinBuf=''; updateDots(); document.getElementById('pin-error').textContent=''; },900);
  }
}

function initMap(){
  if(!mapsOk||!window.google){setTimeout(initMap,300);return;}
  map=new google.maps.Map(document.getElementById('map'),{center:MAPS_CENTER,zoom:13,disableDefaultUI:true,zoomControl:true});
  dirSvc=new google.maps.DirectionsService();
  dirRen=new google.maps.DirectionsRenderer({suppressMarkers:true,polylineOptions:{strokeColor:'#E8FF00',strokeWeight:4}});
  dirRen.setMap(map);
  geocoder=new google.maps.Geocoder();
  origLL=MAPS_CENTER; // default = Minecore
  minecoreLL=MAPS_CENTER; // fixed Minecore location for return
  origMark=new google.maps.Marker({position:MAPS_CENTER,map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#1D9E75',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}});
  const inO=document.getElementById('inp-origin');
  if(inO){
    const ac=new google.maps.places.Autocomplete(inO,{componentRestrictions:{country:'ec'},fields:['geometry','formatted_address','name']});
    ac.addListener('place_changed',()=>{
      const p=ac.getPlace();if(!p.geometry)return;
      origLL={lat:p.geometry.location.lat(),lng:p.geometry.location.lng()};
      const hasName = p.name && p.name.length>2 && !p.name.match(/^[0-9]/);
      const shortAddr = shortName(p.formatted_address);
      const displayName = hasName && p.name !== shortAddr ? p.name+' — '+shortAddr : shortAddr;
      inO.value = displayName;
      setTimeout(()=>{ inO.value = displayName; }, 50);
      setTimeout(()=>{ inO.value = displayName; }, 200);
      origMark.setPosition(origLL);map.panTo(origLL);calcRoute();
    });
  }
  map.addListener('click',e=>{
    const fi=paradas.findIndex(p=>!p.ll);
    const idx=fi>=0?fi:(paradas.length>0?paradas.length-1:0);
    if(paradas.length===0)return;
    paradas[idx].ll={lat:e.latLng.lat(),lng:e.latLng.lng()};
    geocoder.geocode({location:e.latLng},(res,st)=>{
      if(st==='OK'&&res[0]){paradas[idx].addr=res[0].formatted_address;const i=document.getElementById('pi-'+idx);if(i)i.value=paradas[idx].addr;}
    });
    calcRoute();
  });
  paradas.forEach((_,i)=>setupAC(i));
}

function setupAC(i){
  if(!mapsOk||!window.google)return;
  const inp=document.getElementById('pi-'+i);
  if(!inp)return;

function calcRouteVisual(){
  // Draw route on map without updating routeKm (used when loading favorites)
  const valid=paradas.filter(p=>p.ll);if(!origLL||!valid.length)return;
  const dest=valid[valid.length-1].ll;
  const wps=valid.slice(0,-1).map(p=>({location:p.ll,stopover:true}));
  dirSvc.route({
    origin:origLL,destination:dest,waypoints:wps,
    optimizeWaypoints:false,travelMode:google.maps.TravelMode.DRIVING,
    provideRouteAlternatives:true,avoidHighways:false,avoidTolls:false
  },(res,st)=>{
    if(st!=='OK')return;
    if(res.routes.length>1){
      res.routes.sort((a,b)=>{
        const da=a.legs.reduce((s,l)=>s+l.distance.value,0);
        const db=b.legs.reduce((s,l)=>s+l.distance.value,0);
        return da-db;
      });
      dirRen.setRouteIndex(0);
    }
    dirRen.setDirections(res);
    // Place markers
    destMarkers.forEach(m=>m&&m.setMap&&m.setMap(null));destMarkers=[];
    valid.forEach((p,i)=>{
      const m=new google.maps.Marker({position:p.ll,map,label:{text:String(i+1),color:'#2D3142',fontWeight:'bold',fontSize:'12px'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#E8FF00',fillOpacity:1,strokeColor:'#2D3142',strokeWeight:2}});
      destMarkers.push(m);
    });
    const bounds=new google.maps.LatLngBounds();
    res.routes[0].legs.forEach(l=>{bounds.extend(l.start_location);bounds.extend(l.end_location);});
    map.fitBounds(bounds,{top:20,right:20,bottom:20,left:20});
    // NOTE: routeKm is NOT updated here - using saved value
  });
}

function calcRoute(){
  const valid=paradas.filter(p=>p.ll);if(!origLL||!valid.length)return;
  destMarkers.forEach(m=>m&&m.setMap&&m.setMap(null));destMarkers=[];
  // Ruta lineal: origen → parada1 → parada2 → ... → regreso origen
  // Todas las paradas van como waypoints intermedios, destino final = origen (regreso)
  const waypoints = valid.map(p=>({location:p.ll,stopover:true}));
  // Route: origin → parada1 → parada2 → ... → last parada (no return)
  const dest = valid[valid.length-1].ll;
  const wps  = valid.slice(0,-1).map(p=>({location:p.ll,stopover:true}));
  dirSvc.route({
    origin:origLL,
    destination:dest,
    waypoints:wps,
    optimizeWaypoints:false,
    travelMode:google.maps.TravelMode.DRIVING,
    provideRouteAlternatives:true,
    avoidHighways:false,
    avoidTolls:false
  },(res,st)=>{
    if(st!=='OK'){return;}
    // Always pick shortest distance route (consistent, no traffic variation)
    if(res.routes.length>1){
      res.routes.sort((a,b)=>{
        const da=a.legs.reduce((s,l)=>s+l.distance.value,0);
        const db=b.legs.reduce((s,l)=>s+l.distance.value,0);
        return da-db;
      });
      // Force renderer to use shortest route
      dirRen.setRouteIndex(0);
    }
    dirRen.setDirections(res);
    let km=0,s=0;
    res.routes[0].legs.forEach(l=>{km+=l.distance.value;s+=l.duration.value;});
    routeKm=Math.round(km/100)/10;
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
    routeDur=h>0?`${h}h ${m}min`:`${m} min`;
    const precio=parseFloat(config.precio_km||0.35);
    const val=(routeKm*precio).toFixed(2);
    const prev=document.getElementById('km-prev');
    if(prev){prev.style.display='block';document.getElementById('prev-val').textContent='$'+val;document.getElementById('prev-sub').textContent=`${routeKm} km · ${routeDur} · $${precio.toFixed(2)}/km`;}
    const fb=document.getElementById('btn-fav');if(fb)fb.style.display='block';
    valid.forEach((p,i)=>{
      const m=new google.maps.Marker({position:p.ll,map,label:{text:String(i+1),color:'#2D3142',fontWeight:'bold',fontSize:'12px'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#E8FF00',fillOpacity:1,strokeColor:'#2D3142',strokeWeight:2}});
      destMarkers.push(m);
    });

    const bounds=new google.maps.LatLngBounds();
    res.routes[0].legs.forEach(l=>{bounds.extend(l.start_location);bounds.extend(l.end_location);});
    map.fitBounds(bounds,{top:20,right:20,bottom:20,left:20});
  });
}

function placeAddr(addr){
  // Extract street addresses from single or multi-stop route
  if(!addr) return '';
  const stops = addr.split(' → ');
  return stops.map(stop => {
    stop = stop.trim();
    if(stop.includes(' — ')){
      return stop.split(' — ').slice(1).join(' — ').trim(); // just the address
    }
    return stop;
  }).join(' → ');
}

function shortName(addr){
  if(!addr) return '—';
  if(addr.includes('→')){
    return addr.split('→').map(p=>shortName(p.trim())).join(' → ');
  }
  // Remove postal codes, city, country
  let s = addr
    .replace(/,?\s*\d{6}\s*/g, ', ')
    .replace(/,?\s*Quito,?\s*Ecuador\.?/gi, '')
    .replace(/,?\s*Ecuador\.?/gi, '')
    .replace(/\s*&\s*(?:,|$)/g, '')
    .replace(/,\s*,/g, ',')
    .trim()
    .replace(/,\s*$/, '')
    .trim();
  // Split by comma, take first 1-2 meaningful parts
  const parts = s.split(',').map(p=>p.trim()).filter(p=>p.length>1);
  if(parts.length>=2){
    // If first part looks like just a street+number, try to make it readable
    s = parts[0];
    // If it ends with a number or is very long, also include second part
    if(parts[0].length>30) s = parts[0].substring(0,30)+'…';
  } else if(parts.length===1){
    s = parts[0];
  }
  return s || addr;
}

function getPeriodoDates(offset){
  // offset=0 current period, offset=-1 previous, etc.
  const hoy=new Date();
  const diaI=26;
  let base=new Date(hoy);
  if(hoy.getDate()<diaI) base.setMonth(base.getMonth()-1);
  base.setMonth(base.getMonth()+offset);
  const fi=new Date(base.getFullYear(),base.getMonth(),diaI);
  const ff=new Date(base.getFullYear(),base.getMonth()+1,25,23,59,59);

function renderHistBody(){
  const el=document.getElementById('hist-body');if(!el)return;
  const todas=window._histRutas||[];
  const fi=new Date((window._histFi||'2020-01-01')+'T00:00:00');
  const ff=new Date((window._histFf||'2099-12-31')+'T23:59:59');
  const search=(window._histSearch||'').toLowerCase().trim();
  const estado=window._histEstado||'';

  let rutas=todas.filter(rt=>{
    // Date filter
    let ds=String(rt['Fecha Servicio']||rt['Fecha Solicitud']||'').split(' ')[0];
    if(!ds||ds==='undefined')return false;
    let d;
    if(ds.includes('-')&&ds.length>=8) d=new Date(ds+'T12:00:00');
    else if(!isNaN(parseFloat(ds))) d=new Date((parseFloat(ds)-25569)*86400000);
    if(!d||isNaN(d.getTime()))return false;
    if(d<fi||d>ff)return false;

        .join(' ').toLowerCase();

            <span style="color:var(--brand);font-weight:600">👤 ${usuario}</span>
            ${veh?`<span style="color:var(--text3)">🚗 ${veh}</span>`:''}
          </div>

function setCorteFiltro(filtro){
  const hoy=new Date();
  const hoyStr=hoy.toISOString().split('T')[0];
  const ayer=new Date(hoy);ayer.setDate(hoy.getDate()-1);
  window._corteFiltro=filtro;
  if(filtro==='hoy'){window._corteFi=hoyStr;window._corteFf=hoyStr;}
  else if(filtro==='ayer'){const a=ayer.toISOString().split('T')[0];window._corteFi=a;window._corteFf=a;}
  else if(filtro==='7dias'){const s=new Date(hoy);s.setDate(hoy.getDate()-6);window._corteFi=s.toISOString().split('T')[0];window._corteFf=hoyStr;}
  else if(filtro==='periodo'){const d=getPeriodoDates(0);window._corteFi=d.fi;window._corteFf=d.ff;}
  else if(filtro==='periodo_ant'){const d=getPeriodoDates(-1);window._corteFi=d.fi;window._corteFf=d.ff;}
  const fi=document.getElementById('corte-fi');const ff=document.getElementById('corte-ff');
  if(fi)fi.value=window._corteFi;if(ff)ff.value=window._corteFf;
  document.querySelectorAll('[id^="corte-btn-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('corte-btn-'+filtro);if(btn)btn.classList.add('active');
  renderCorteBody();
}

function applyCorteRango(){
  window._corteFi=document.getElementById('corte-fi').value;
  window._corteFf=document.getElementById('corte-ff').value;
  window._corteFiltro='custom';
  document.querySelectorAll('[id^="corte-btn-"]').forEach(b=>b.classList.remove('active'));
  renderCorteBody();
}

function renderCorteBody(){
  const el=document.getElementById('corte-body');if(!el)return;
  const todas=window._corteRutas||[];
  const fi=new Date((window._corteFi||'2020-01-01')+'T00:00:00');
  const ff=new Date((window._corteFf||'2099-12-31')+'T23:59:59');
  const rutas=todas.filter(rt=>{
    // Handle both text dates (2026-06-05) and Excel serials (46181.5)
    let ds = String(rt['Fecha Servicio']||rt['Fecha Solicitud']||'').split(' ')[0];
    if(!ds||ds==='undefined')return false;
    let d;
    if(ds.includes('-')&&ds.length>=8){
      d=new Date(ds+'T12:00:00');
    } else if(!isNaN(parseFloat(ds))){
      // Excel serial date: days since 1899-12-30
      const serial=parseFloat(ds);
      d=new Date((serial-25569)*86400000); // convert to JS timestamp
    }
    if(!d||isNaN(d.getTime()))return false;
    return d>=fi&&d<=ff;
  });

  const VEHICULO_OWNER={
    'Camioneta Nissan':{usuario:'EFCH',nombre:'Esteban Ferlito'},
    'Moto Minecore':   {usuario:'EFCH',nombre:'Esteban Ferlito'},
    'Camioneta Mazda': {usuario:'MPL', nombre:'Martín Pinto'},
    'Camioneta Poer':  {usuario:'OPM', nombre:'Oswaldo Peña'}
  };
  const byOwner={};
  rutas.forEach(rt=>{
    const veh=String(rt['Vehiculo']||'').trim();
    const owner=VEHICULO_OWNER[veh];
    if(!owner)return;
    const key=owner.usuario;
    if(!byOwner[key])byOwner[key]={usuario:key,nombre:owner.nombre,km:0,usd:0,vehiculos:{}};
    byOwner[key].km=Math.round((byOwner[key].km+parseFloat(rt['KM']||0))*10)/10;
    byOwner[key].usd=Math.round((byOwner[key].usd+parseFloat(rt['Valor ($)']||0))*100)/100;
    if(!byOwner[key].vehiculos[veh])byOwner[key].vehiculos[veh]={km:0,usd:0,count:0};
    byOwner[key].vehiculos[veh].km=Math.round((byOwner[key].vehiculos[veh].km+parseFloat(rt['KM']||0))*10)/10;
    byOwner[key].vehiculos[veh].usd=Math.round((byOwner[key].vehiculos[veh].usd+parseFloat(rt['Valor ($)']||0))*100)/100;
    byOwner[key].vehiculos[veh].count++;
  });
  const ownerList=Object.values(byOwner).sort((a,b)=>b.usd-a.usd);
  const totalKm=Math.round(rutas.reduce((s,r)=>s+parseFloat(r['KM']||0),0)*10)/10;
  const totalUsd=Math.round(rutas.reduce((s,r)=>s+parseFloat(r['Valor ($)']||0),0)*100)/100;
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const fid=new Date(window._corteFi+'T12:00:00');
  const ffd=new Date(window._corteFf+'T12:00:00');
  const label=window._corteFi===window._corteFf
    ?fid.getDate()+' '+meses[fid.getMonth()]+' '+fid.getFullYear()
    :fid.getDate()+' '+meses[fid.getMonth()]+' → '+ffd.getDate()+' '+meses[ffd.getMonth()]+' '+ffd.getFullYear();

  el.innerHTML=`
  <div class="corte-total" style="margin-bottom:12px">
    <div class="corte-label">Total a pagar</div>
    <div class="corte-amount">$${totalUsd.toFixed(2)}</div>
    <div class="corte-sub">${label}</div>
  </div>
  <div class="corte-stats" style="margin-bottom:12px">
    <div class="corte-stat"><div class="corte-stat-val">${rutas.length}</div><div class="corte-stat-lbl">Rutas</div></div>
    <div class="corte-stat"><div class="corte-stat-val">${totalKm}</div><div class="corte-stat-lbl">KM</div></div>
    <div class="corte-stat"><div class="corte-stat-val">$${totalUsd&&rutas.length?(totalUsd/rutas.length).toFixed(2):'0.00'}</div><div class="corte-stat-lbl">Prom.</div></div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:14px">💰 Desglose por propietario</div>
    ${ownerList.map(o=>{
      const co=col(o.usuario);
      const vehLines=Object.entries(o.vehiculos).map(([v,d])=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--border)">
          <div style="font-size:12px;color:var(--text2)">${v} · ${d.km} km · ${d.count} ruta${d.count!==1?'s':''}</div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">$${d.usd.toFixed(2)}</div>
        </div>`).join('');
      return `<div style="background:var(--surface2);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:38px;height:38px;border-radius:50%;background:${co.bg};color:${co.tx};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900">${o.usuario}</div>
            <div><div style="font-size:14px;font-weight:700;color:var(--text)">${o.nombre}</div>
            <div style="font-size:11px;color:var(--text3)">${o.km} km total</div></div>
          </div>
          <div style="font-size:20px;font-weight:900;color:var(--brand)">$${o.usd.toFixed(2)}</div>
        </div>${vehLines}
      </div>`;
    }).join('')||'<div class="empty">Sin rutas con vehículo asignado</div>'}
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">Detalle de rutas (${rutas.length})</div>
    ${rutas.length?rutas.map(rt=>`
      <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:.5px solid var(--border)">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${placeName(rt['Destino']||'—')}</div>
          <div style="font-size:11px;color:var(--text2)">${fd(rt['Fecha Servicio']||'')} · ${rt['KM']} km · ${rt['Usuario']}${rt['Vehiculo']?' · '+rt['Vehiculo']:''}</div>
        </div>
        <div style="font-size:14px;font-weight:700;color:var(--text)">$${parseFloat(rt['Valor ($)']).toFixed(2)}</div>
      </div>`).join(''):'<div class="empty">Sin rutas en este período</div>'}
  </div>`;
}

  const btn=document.getElementById('btn-g');btn.textContent='Enviando...';btn.disabled=true;
  try{const r=await api({action:'crearGasto',usuario:session.usuario,monto:m,categoria:document.getElementById('g-c').value,descripcion:document.getElementById('g-d').value||'Sin descripción',fotoUrl:document.getElementById('gurl').value||''});
  if(r.ok){toast('✓ Gasto enviado');setView('mis-gastos');}else toast('Error: '+(r.error||''));}catch(e){toast('Error conexión');}
  btn.textContent='Enviar para aprobación';btn.disabled=false;
}

function entregasH(ent){
  if(!ent.length)return'<div class="empty">Sin entregas</div>';
  return ent.map(e=>{
    // Use exact column names from Sheet
    const desc  = e['Descripción']||e['Descripcion']||'Sin descripción';
    const forma = e['Forma de Entrega']||e['Forma']||'—';
    const dest  = e['Usuario Destino']||'—';
    const monto = parseFloat(e['Monto ($)']||0).toFixed(2);
    const foto  = String(e['Foto URL']||'');
    const fecha = fd((String(e['Fecha']||'')).split(' ')[0]);
    return `<div class="caja-item">
    <div class="caja-desc">${desc}</div>
    <div class="caja-monto" style="color:var(--gold)">$${monto}</div>
    <div class="caja-meta">Para: <strong>${dest}</strong> · ${forma} · ${fecha}</div>
    ${foto.startsWith('http')?`<a href="${foto}" target="_blank" class="caja-foto-link">📎 Ver comprobante</a>`:''}</div>`;}).join('');
}

function gastoH(g,admin){
  const est=g['Estado']||'Pendiente';const bc=est==='Aprobado'?'approved':est==='Rechazado'?'rejected':'pending';
  const acc=admin&&est==='Pendiente'?`<div class="action-row"><button class="btn-reject" onclick="rejG('${g['ID']}')">Rechazar</button><button class="btn-approve" onclick="aprG('${g['ID']}')">✓ Aprobar</button></div>`:'';
  return`<div class="caja-item">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><div class="caja-desc">${g['Descripcion']||g['Descripción']||'Sin descripción'}</div><span class="badge ${bc}">${est}</span></div>
    <div class="caja-monto" style="font-size:16px;font-weight:700;color:var(--text)">$${parseFloat(g['Monto ($)']||0).toFixed(2)}</div>
    <div class="caja-meta">${g['Categoria']||g['Categoría']||''} · ${g['Usuario']} · ${fd((g['Fecha']||'').split(' ')[0])}</div>
    ${g['Foto URL']&&String(g['Foto URL']).startsWith('http')?`<a href="${g['Foto URL']}" target="_blank" class="caja-foto-link">📎 Ver factura</a>`:''}${acc}</div>`;
}
async function aprG(id){try{const r=await api({action:'aprobarGasto',id,admin:session.usuario});if(r.ok){toast('✓ Aprobado');setView('aprobar-gastos');}else toast('Error');}catch(e){toast('Error conexión');}}
async function rejG(id){try{const r=await api({action:'rechazarGasto',id,admin:session.usuario});if(r.ok){toast('Rechazado');setView('aprobar-gastos');}else toast('Error');}catch(e){toast('Error conexión');}}

// ── FOTOS ──────────────────────────────────────────────────
async function uploadFoto(inp,prevId,statId,urlId){
  const file=inp.files[0];if(!file)return;
  document.getElementById(prevId).src=URL.createObjectURL(file);
  document.getElementById(prevId).style.display='block';
  const stat=document.getElementById(statId);
  stat.style.display='block';stat.style.color='var(--text2)';stat.textContent='Subiendo foto...';
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const r=await api({action:'savePhoto',base64:b64,mimeType:file.type,nombre:file.name||'foto.jpg'});
    if(r.ok){document.getElementById(urlId).value=r.url;stat.textContent='✓ Foto subida';stat.style.color='var(--brand)';}
    else{stat.textContent='Error: '+(r.error||'');stat.style.color='var(--danger-text)';}
  }catch(e){stat.textContent='Error de conexión';stat.style.color='var(--danger-text)';}
}

// ── API & HELPERS ──────────────────────────────────────────
async function api(data){
  const p=new URLSearchParams();
  Object.entries(data).forEach(([k,v])=>p.append(k,String(v)));
  const r=await fetch(SCRIPT_URL+'?'+p.toString(),{redirect:'follow'});
  return r.json();
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function hoy(){return new Date().toISOString().split('T')[0];}
function fd(s){
  if(!s||s==='undefined'||s==='0')return'—';
  const str=String(s).split(' ')[0];
  // Handle Excel serial dates
  if(!str.includes('-')&&!isNaN(parseFloat(str))){
    const d=new Date((parseFloat(str)-25569)*86400000);
    const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();
  }
  const p=str.split('-');
  if(p.length<3)return str;
  const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return parseInt(p[2])+' '+m[parseInt(p[1])-1]+' '+p[0];
}
function spin(){return'<div class="loading"><div class="spinner"></div>Cargando...</div>';}
function err(){
  return`<div class="empty" style="padding:32px 16px;text-align:center">
    <div style="font-size:32px;margin-bottom:10px">⚠️</div>
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px">Error de conexión</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">No se pudo conectar al servidor</div>
    <button onclick="setView(activeView)" style="padding:8px 16px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px">🔄 Reintentar</button>
  </div>`;
}
